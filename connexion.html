<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AFRIMARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <!-- SUPABASE OBLIGATOIRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary-blue: #1d3557;
            --primary-red: #ef4444;
            --primary-green: #10b981;
            --light-bg: #f8fafc;
            --light-card: #ffffff;
            --light-text: #1e293b;
            --light-border: #e2e8f0;
            --light-gray: #94a3b8;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-text: #f1f5f9;
            --dark-border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: var(--light-text);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-text-size-adjust: 100%;
        }

        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .app-header {
            background-color: var(--light-card);
            padding: 15px 0;
            border-bottom: 1px solid var(--light-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .dark-mode .app-header {
            background-color: var(--dark-card);
            border-color: var(--dark-border);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 20px;
            font-weight: 900;
            color: var(--light-text);
        }

        .dark-mode .logo-text {
            color: var(--dark-text);
        }

        .logo-text span {
            color: var(--primary-red);
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: var(--light-text);
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .dark-mode .theme-btn {
            color: var(--dark-text);
        }

        .theme-btn:hover {
            background: rgba(37, 99, 235, 0.1);
        }

        /* Contenu principal */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        .auth-card {
            background: var(--light-card);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--light-border);
            width: 100%;
            max-width: 420px;
            transition: var(--transition);
        }

        .dark-mode .auth-card {
            background: var(--dark-card);
            border-color: var(--dark-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--light-text);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .dark-mode .auth-header h2 {
            color: var(--dark-text);
        }

        .auth-header p {
            color: var(--light-gray);
            font-size: 14px;
        }

        .dark-mode .auth-header p {
            color: #94a3b8;
        }

        /* Formulaire */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--light-text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dark-mode .form-label {
            color: var(--dark-text);
        }

        .form-label.required:after {
            content: " *";
            color: var(--primary-red);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--light-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--light-bg);
            color: var(--light-text);
            transition: var(--transition);
        }

        .dark-mode .form-input {
            background: var(--dark-bg);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .password-input {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--light-gray);
            cursor: pointer;
            padding: 5px;
        }

        .dark-mode .toggle-password {
            color: #94a3b8;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 13px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--light-gray);
            cursor: pointer;
        }

        .dark-mode .checkbox-label {
            color: #94a3b8;
        }

        .forgot-password {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .dark-mode .forgot-password {
            color: #60a5fa;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* Bouton de connexion */
        .auth-btn {
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(29, 53, 87, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Footer auth */
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--light-border);
        }

        .dark-mode .auth-footer {
            border-color: var(--dark-border);
        }

        .auth-footer p {
            color: var(--light-gray);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .dark-mode .auth-footer p {
            color: #94a3b8;
        }

        .auth-footer a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .dark-mode .auth-footer a {
            color: #60a5fa;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .notification.success {
            background: var(--primary-green);
        }

        .notification.error {
            background: var(--primary-red);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }

        .loading-spinner {
            background: var(--light-card);
            padding: 30px;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .dark-mode .loading-spinner {
            background: var(--dark-card);
        }

        /* Admin link */
        .admin-link {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--light-border);
        }

        .dark-mode .admin-link {
            border-color: var(--dark-border);
        }

        .admin-link-btn {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            transition: var(--transition);
        }

        .admin-link-btn:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            .container {
                padding: 0 15px;
            }
        }

        /* Prévention débordement */
        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 15px;">Connexion en cours...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="container">
            <div class="header-content">
                <a href="dashboard.html" class="logo-container">
                    <div class="logo-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <div class="logo-text">AFRI<span>MARKET</span></div>
                </a>
                
                <button class="theme-btn" id="themeBtn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="main-content">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2>
                        <i class="fas fa-sign-in-alt"></i>
                        Connexion
                    </h2>
                    <p>Connectez-vous à votre compte AFRIMARKET</p>
                </div>

                <form id="connexion-form" class="auth-form">
                    <!-- Email -->
                    <div class="form-group">
                        <label for="login-email" class="form-label required">
                            <i class="fas fa-envelope"></i> Adresse email
                        </label>
                        <input type="email" 
                               id="login-email" 
                               class="form-input"
                               name="email" 
                               placeholder="exemple@email.com"
                               required
                               autocomplete="email">
                    </div>

                    <!-- Mot de passe -->
                    <div class="form-group">
                        <label for="login-password" class="form-label required">
                            <i class="fas fa-lock"></i> Mot de passe
                        </label>
                        <div class="password-input">
                            <input type="password" 
                                   id="login-password" 
                                   class="form-input"
                                   name="password" 
                                   placeholder="Votre mot de passe"
                                   required
                                   autocomplete="current-password">
                            <button type="button" class="toggle-password" id="togglePasswordBtn">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="remember-me"> Se souvenir de moi
                            </label>
                            <a href="#" class="forgot-password" id="forgotPassword">
                                Mot de passe oublié ?
                            </a>
                        </div>
                    </div>

                    <!-- Bouton de connexion -->
                    <button type="submit" class="btn auth-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>

                <!-- Footer -->
                <div class="auth-footer">
                    <p>Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
                    <p><a href="dashboard.html">Continuer sans compte</a></p>
                    
                    <!-- Accès admin caché -->
                    <div class="admin-link">
                        <button type="button" class="admin-link-btn" id="adminAccessBtn">
                            <i class="fas fa-user-shield"></i> Accès administrateur
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        // Configuration Admin - ACCÈS UNIQUEMENT POUR TOI
        const ADMIN_EMAIL = 'abdoula14cherif@gmail.com';
        const ADMIN_PASSWORD = 'abdoula.@5';
        
        let supabaseClient = null;
        let adminClickCount = 0;
        
        // Fonction pour afficher les notifications
        function showNotification(message, type = 'info') {
            // Supprimer les anciennes notifications
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            // Créer la nouvelle notification
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 
                               type === 'error' ? 'fa-exclamation-circle' : 
                               'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notif);
            
            // Supprimer après 5 secondes
            setTimeout(() => notif.remove(), 5000);
        }
        
        // Fonction pour montrer/cacher le loading
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const loginBtn = document.getElementById('loginBtn');
            
            if (show) {
                overlay.style.display = 'flex';
                if (loginBtn) {
                    loginBtn.disabled = true;
                    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
                }
            } else {
                overlay.style.display = 'none';
                if (loginBtn) {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                }
            }
        }
        
        // Vérifier si l'utilisateur est admin
        function isAdminUser(email) {
            return email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
        }
        
        // Fonction de connexion
        async function connecterUtilisateur(email, password, rememberMe = false) {
            try {
                console.log('Connexion pour:', email);
                
                // VÉRIFICATION SPÉCIALE POUR L'ADMIN
                const isAdmin = isAdminUser(email) && password === ADMIN_PASSWORD;
                
                if (isAdmin) {
                    console.log('✅ Connexion admin détectée');
                    
                    // Créer un ID unique pour l'admin
                    const adminId = 'admin-' + Date.now();
                    
                    // Stocker les informations admin
                    localStorage.setItem('afrimarket_user_id', adminId);
                    localStorage.setItem('afrimarket_user_email', ADMIN_EMAIL);
                    localStorage.setItem('afrimarket_user_name', 'abdoula cherif');
                    localStorage.setItem('afrimarket_user_role', 'admin');
                    localStorage.setItem('afrimarket_logged_in', 'true');
                    
                    if (rememberMe) {
                        localStorage.setItem('afrimarket_remember_me', 'true');
                    }
                    
                    return {
                        success: true,
                        message: '✅ Connexion administrateur réussie !',
                        user: {
                            email: ADMIN_EMAIL,
                            nom_complet: 'abdoula cherif',
                            role: 'admin'
                        },
                        isAdmin: true
                    };
                }
                
                // POUR LES UTILISATEURS NORMALS - CONNEXION SUPABASE
                if (!supabaseClient) {
                    return {
                        success: false,
                        error: 'Système de connexion indisponible'
                    };
                }
                
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('Erreur connexion:', error);
                    
                    let errorMsg = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = 'Email ou mot de passe incorrect';
                    }
                    
                    return { success: false, error: errorMsg };
                }
                
                console.log('✅ Connexion utilisateur réussie:', data);
                
                // Stocker les informations utilisateur
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', data.user.user_metadata?.nom_complet || 'Utilisateur');
                localStorage.setItem('afrimarket_user_role', 'user');
                localStorage.setItem('afrimarket_logged_in', 'true');
                
                if (rememberMe) {
                    localStorage.setItem('afrimarket_remember_me', 'true');
                }
                
                return {
                    success: true,
                    message: 'Connexion réussie !',
                    user: data.user,
                    isAdmin: false
                };
                
            } catch (error) {
                console.error('Erreur générale:', error);
                return {
                    success: false,
                    error: 'Erreur de connexion. Veuillez réessayer.'
                };
            }
        }
        
        // Vérifier si déjà connecté
        async function verifierSession() {
            try {
                const userId = localStorage.getItem('afrimarket_user_id');
                const loggedIn = localStorage.getItem('afrimarket_logged_in') === 'true';
                const userEmail = localStorage.getItem('afrimarket_user_email');
                const userRole = localStorage.getItem('afrimarket_user_role');
                
                if (userId && loggedIn && userEmail) {
                    // Si c'est l'admin, rediriger vers admin.html
                    if (userEmail === ADMIN_EMAIL && userRole === 'admin') {
                        console.log('✅ Admin déjà connecté, redirection vers admin.html');
                        window.location.href = 'admin.html';
                        return true;
                    } else {
                        // Si c'est un utilisateur normal, rediriger vers dashboard
                        console.log('✅ Utilisateur déjà connecté, redirection vers dashboard.html');
                        window.location.href = 'dashboard.html';
                        return true;
                    }
                }
                
                return false;
                
            } catch (error) {
                console.error('Erreur vérification session:', error);
                return false;
            }
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Page connexion chargée');
            
            // Vérifier si déjà connecté
            const isConnected = await verifierSession();
            if (isConnected) return;
            
            // Initialiser Supabase
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
                console.log('✅ Supabase initialisé');
            }
            
            // Gestion du thème
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
            });
            
            // Toggle mot de passe
            const toggleBtn = document.getElementById('togglePasswordBtn');
            const passwordInput = document.getElementById('login-password');
            
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', function() {
                    const type = passwordInput.type === 'password' ? 'text' : 'password';
                    passwordInput.type = type;
                    toggleBtn.innerHTML = type === 'password' ? 
                        '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                });
            }
            
            // Mot de passe oublié
            const forgotPasswordBtn = document.getElementById('forgotPassword');
            if (forgotPasswordBtn) {
                forgotPasswordBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    showNotification('Contactez support@afrimarket.com pour réinitialiser votre mot de passe', 'info');
                });
            }
            
            // Accès admin caché
            const adminBtn = document.getElementById('adminAccessBtn');
            if (adminBtn) {
                adminBtn.addEventListener('click', function() {
                    adminClickCount++;
                    
                    if (adminClickCount === 3) {
                        // Remplir automatiquement les champs admin
                        document.getElementById('login-email').value = ADMIN_EMAIL;
                        document.getElementById('login-password').value = ADMIN_PASSWORD;
                        document.getElementById('remember-me').checked = true;
                        
                        showNotification('Champs admin pré-remplis. Cliquez sur "Se connecter"', 'success');
                        
                        // Réinitialiser le compteur après 5 secondes
                        setTimeout(() => {
                            adminClickCount = 0;
                        }, 5000);
                    } else if (adminClickCount === 1) {
                        showNotification('Cliquez 2 fois de plus pour remplir les champs admin', 'info');
                        setTimeout(() => {
                            adminClickCount = 0;
                        }, 3000);
                    }
                });
            }
            
            // Soumission formulaire
            const form = document.getElementById('connexion-form');
            
            if (form) {
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    console.log('Formulaire soumis');
                    
                    const email = document.getElementById('login-email').value.trim().toLowerCase();
                    const password = document.getElementById('login-password').value;
                    const rememberMe = document.getElementById('remember-me').checked;
                    
                    // Validation basique
                    if (!email.includes('@') || !email.includes('.')) {
                        showNotification('Email invalide', 'error');
                        return;
                    }
                    
                    if (password.length < 6) {
                        showNotification('Mot de passe trop court (minimum 6 caractères)', 'error');
                        return;
                    }
                    
                    // Afficher le loading
                    showLoading(true);
                    
                    try {
                        // Appeler la fonction de connexion
                        const result = await connecterUtilisateur(email, password, rememberMe);
                        
                        if (result.success) {
                            showNotification(result.message, 'success');
                            
                            // Redirection selon le type d'utilisateur
                            setTimeout(() => {
                                if (result.isAdmin) {
                                    window.location.href = 'admin.html';
                                } else {
                                    window.location.href = 'dashboard.html';
                                }
                            }, 1500);
                            
                        } else {
                            showNotification('Erreur: ' + result.error, 'error');
                            showLoading(false);
                        }
                        
                    } catch (error) {
                        console.error('Erreur catch:', error);
                        showNotification('Erreur technique: ' + error.message, 'error');
                        showLoading(false);
                    }
                });
            }
            
            // Pré-remplir l'email si stocké
            const savedEmail = localStorage.getItem('afrimarket_user_email');
            if (savedEmail && document.getElementById('login-email')) {
                document.getElementById('login-email').value = savedEmail;
                document.getElementById('remember-me').checked = true;
            }
            
            // Pré-remplir avec des données de test (désactiver en production)
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                // Seulement en développement local
                console.log('Mode développement - pré-remplissage activé');
                // document.getElementById('login-email').value = 'test@example.com';
                // document.getElementById('login-password').value = 'password123';
            }
        });
    </script>
</body>
