<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test Inscription Afrimarket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #0066cc; color: white; border: none; border-radius: 5px; }
        .message { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">Inscription Afrimarket</h2>
        
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe (6 caractères mini)" required>
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>
        
        <p style="text-align:center; margin-top:20px;">
            <a href="connexion.html">Déjà un compte ?</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Vos clés SUPABASE directement ici
        const supabase = window.supabase.createClient(
            'https://kfbstzlauxdwezgtzdsx.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYnN0emxhdXhkd2V6Z3R6ZHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODYzMDQsImV4cCI6MjA4NjU2MjMwNH0.a43ze2_uKyaEgodntEvMRFEH7mNgByyfUHfzQpEKDFM'
        );

        console.log('✅ Supabase prêt');

        const form = document.getElementById('signupForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            console.log('📝 Tentative:', email);

            // Afficher le chargement
            submitBtn.disabled = true;
            submitBtn.textContent = 'Inscription...';
            message.style.display = 'none';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                console.log('✅ Succès:', data);
                
                message.className = 'message success';
                message.innerHTML = '✅ Inscription réussie ! Vérifiez vos emails.';
                
                // Redirection après 3 secondes
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 3000);

            } catch (error) {
                console.error('❌ Erreur:', error);
                
                message.className = 'message error';
                message.innerHTML = '❌ ' + error.message;
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'S\'inscrire';
            }
        });
    </script>
</body>
</html>
