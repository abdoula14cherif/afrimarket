<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #1d3557;
            margin-bottom: 30px;
            text-align: center;
        }
        .code-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #1d3557;
            outline: none;
        }
        input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(29,53,87,0.3);
        }
        .error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 5px;
        }
        .success {
            color: #10b981;
            font-size: 14px;
            margin-top: 5px;
        }
        .hidden {
            display: none;
        }
        #debug {
            margin-top: 20px;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 AFRIMARKET</h2>
        
        <div id="codeBadge" class="code-badge">
            🔍 Vérification du code...
        </div>

        <form id="inscriptionForm">
            <input type="text" id="referralCode" placeholder="Code de parrainage" readonly value="CHARGEMENT...">
            
            <input type="text" id="nomComplet" placeholder="Nom complet" required>
            
            <input type="email" id="email" placeholder="Adresse email" required>
            
            <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" required minlength="6">
            
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
            
            <div id="passwordMatch" class="error hidden">Les mots de passe ne correspondent pas</div>
            
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>

        <div id="message"></div>
        <div id="debug"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // UTILITAIRES
        // ============================================
        function debug(msg) {
            const el = document.getElementById('debug');
            el.innerHTML += `<div>📋 ${new Date().toLocaleTimeString()} - ${msg}</div>`;
            console.log(msg);
        }

        function showMessage(msg, type = 'error') {
            const el = document.getElementById('message');
            el.innerHTML = `<div style="color: ${type === 'success' ? '#10b981' : '#ef4444'}; margin-top: 10px;">${msg}</div>`;
        }

        // ============================================
        // RÉCUPÉRER LE CODE DE L'URL
        // ============================================
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            
            return code ? code.toUpperCase() : null;
        }

        // ============================================
        // VALIDATION DU CODE (SANS TABLE)
        // ============================================
        async function validateReferralCode(code) {
            debug(`🔍 Validation du code: ${code}`);
            
            // ✅ CODE ADMIN ACCEPTÉ AUTOMATIQUEMENT
            if (code === 'ABDOULA') {
                debug('✅ Code ABDOULA accepté');
                return true;
            }
            
            try {
                // ESSAYER DE VALIDER, MAIS SI LA TABLE N'EXISTE PAS, ON ACCEPTE QUAND MÊME
                const { data, error } = await supabase
                    .from('referral_data')
                    .select('referral_code')
                    .eq('referral_code', code)
                    .maybeSingle();
                
                if (error) {
                    debug(`⚠️ Table referral_data inaccessible: ${error.message}`);
                    debug(`✅ Code ${code} accepté (mode dégradé)`);
                    return true;
                }
                
                if (data) {
                    debug(`✅ Code ${code} trouvé dans la base`);
                    return true;
                }
                
                debug(`⚠️ Code ${code} non trouvé, mais accepté quand même`);
                return true; // TOUJOURS ACCEPTER POUR LE TEST
                
            } catch (e) {
                debug(`❌ Erreur validation: ${e.message}`);
                return true; // ACCEPTER EN CAS D'ERREUR
            }
        }

        // ============================================
        // INSCRIPTION - SANS AUCUNE TABLE
        // ============================================
        async function inscrireUtilisateur(userData) {
            debug(`📝 Inscription pour: ${userData.email}`);
            
            try {
                // 1. INSCRIPTION SUPABASE UNIQUEMENT
                const { data, error } = await supabase.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                    options: {
                        data: {
                            nom_complet: userData.nom_complet,
                            telephone: userData.telephone || '',
                            role: 'user',
                            referral_code: userData.referral_code
                        }
                    }
                });
                
                if (error) {
                    debug(`❌ Erreur Supabase: ${error.message}`);
                    
                    if (error.message.includes('already registered')) {
                        return { success: false, error: 'Un compte existe déjà avec cet email' };
                    }
                    
                    return { success: false, error: error.message };
                }
                
                if (!data.user) {
                    return { success: false, error: 'Erreur création utilisateur' };
                }
                
                debug(`✅ UTILISATEUR CRÉÉ: ${data.user.id}`);
                
                // 2. STOCKER DANS LOCALSTORAGE
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', userData.nom_complet);
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_referral_used', userData.referral_code);
                
                debug(`✅ Session localStorage créée`);
                
                return { 
                    success: true, 
                    message: '✅ Inscription réussie !',
                    user: data.user
                };
                
            } catch (error) {
                debug(`❌ ERREUR CRITIQUE: ${error.message}`);
                return { 
                    success: false, 
                    error: 'Erreur technique. Veuillez réessayer.' 
                };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            debug('🚀 Page inscription chargée');
            
            // 1. CODE DE PARRAINAGE
            let codeFromURL = getReferralCodeFromURL();
            
            if (!codeFromURL) {
                codeFromURL = 'ABDOULA'; // CODE PAR DÉFAUT
                debug(`⚠️ Aucun code trouvé, utilisation du code par défaut: ${codeFromURL}`);
            }
            
            // Afficher le code
            document.getElementById('referralCode').value = codeFromURL;
            
            // Valider le code
            const isValid = await validateReferralCode(codeFromURL);
            
            if (isValid) {
                document.getElementById('codeBadge').innerHTML = `
                    ✅ Code valide: <strong>${codeFromURL}</strong>
                `;
                document.getElementById('codeBadge').style.background = 'linear-gradient(135deg, #10b981, #059669)';
            } else {
                document.getElementById('codeBadge').innerHTML = `
                    ⚠️ Code invalide, inscription bloquée
                `;
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            // 2. VALIDATION MOT DE PASSE
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            const matchMsg = document.getElementById('passwordMatch');
            
            function checkPasswordMatch() {
                if (confirm.value.length > 0) {
                    if (password.value === confirm.value) {
                        matchMsg.classList.add('hidden');
                    } else {
                        matchMsg.classList.remove('hidden');
                    }
                }
            }
            
            password.addEventListener('input', checkPasswordMatch);
            confirm.addEventListener('input', checkPasswordMatch);

            // 3. SUBMIT
            const form = document.getElementById('inscriptionForm');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Vérifications
                if (password.value !== confirm.value) {
                    showMessage('❌ Les mots de passe ne correspondent pas');
                    return;
                }
                
                if (password.value.length < 6) {
                    showMessage('❌ Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }
                
                const userData = {
                    nom_complet: document.getElementById('nomComplet').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: password.value,
                    telephone: '',
                    referral_code: codeFromURL
                };
                
                if (userData.nom_complet.length < 2) {
                    showMessage('❌ Veuillez entrer votre nom complet');
                    return;
                }
                
                if (!userData.email.includes('@')) {
                    showMessage('❌ Email invalide');
                    return;
                }
                
                // Désactiver le bouton
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.textContent = 'Inscription en cours...';
                
                // Inscription
                const result = await inscrireUtilisateur(userData);
                
                if (result.success) {
                    showMessage('✅ Inscription réussie ! Redirection...', 'success');
                    debug('✅ Redirection vers dashboard.html');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    showMessage('❌ ' + result.error);
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                }
            });
        });
    </script>
</body>
</html>
