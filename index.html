<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #1d3557;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 30px;
        }
        .code-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }
        .code-badge.valid {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #1d3557;
            outline: none;
            box-shadow: 0 0 0 3px rgba(29,53,87,0.1);
        }
        input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29,53,87,0.3);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }
        .link a {
            color: #1d3557;
            text-decoration: none;
            font-weight: 600;
        }
        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AFRIMARKET</h1>
        <div class="subtitle">Rejoignez la communauté et commencez à gagner</div>
        
        <div id="codeBadge" class="code-badge">
            🔍 Vérification du code de parrainage...
        </div>

        <form id="inscriptionForm">
            <input type="text" id="referralCode" placeholder="Code de parrainage" readonly>
            <input type="text" id="fullName" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Adresse email" required>
            <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" minlength="6" required>
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>

        <div id="message"></div>
        
        <div class="link">
            <a href="connexion.html">Déjà un compte ? Se connecter</a>
        </div>
    </div>

    <script>
        // Vérifier le code de parrainage
        async function validateReferralCode(code) {
            if (code === 'ABDOULA') return true;
            try {
                const { data, error } = await supabase
                    .from('referral_data')
                    .select('referral_code')
                    .eq('referral_code', code)
                    .eq('is_unlocked', true)
                    .maybeSingle();
                return !error && !!data;
            } catch (e) {
                return false;
            }
        }

        // Récupérer le code de l'URL
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            return code ? code.toUpperCase() : null;
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            const code = getReferralCodeFromURL();
            const badge = document.getElementById('codeBadge');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!code) {
                badge.innerHTML = '❌ Code de parrainage requis';
                badge.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                submitBtn.disabled = true;
                return;
            }
            
            document.getElementById('referralCode').value = code;
            
            const isValid = await validateReferralCode(code);
            
            if (isValid) {
                badge.innerHTML = `✅ Code valide: <strong>${code}</strong>`;
                badge.classList.add('valid');
                submitBtn.disabled = false;
            } else {
                badge.innerHTML = `❌ Code invalide: ${code}`;
                badge.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                submitBtn.disabled = true;
            }

            // Validation mot de passe
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            
            function checkPasswordMatch() {
                if (confirm.value.length > 0) {
                    if (password.value !== confirm.value) {
                        document.getElementById('message').innerHTML = '<div class="message error">❌ Les mots de passe ne correspondent pas</div>';
                    } else {
                        document.getElementById('message').innerHTML = '';
                    }
                }
            }
            
            password.addEventListener('input', checkPasswordMatch);
            confirm.addEventListener('input', checkPasswordMatch);

            // Soumission formulaire
            document.getElementById('inscriptionForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (password.value !== confirm.value) {
                    document.getElementById('message').innerHTML = '<div class="message error">❌ Les mots de passe ne correspondent pas</div>';
                    return;
                }
                
                const userData = {
                    nom_complet: document.getElementById('fullName').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: password.value,
                    telephone: ''
                };
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Inscription en cours...';
                
                const result = await window.inscrireUtilisateur(userData);
                
                if (result.success) {
                    document.getElementById('message').innerHTML = '<div class="message success">✅ Inscription réussie ! Redirection...</div>';
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                } else {
                    document.getElementById('message').innerHTML = `<div class="message error">❌ ${result.error}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'S\'inscrire';
                }
            });
        });
    </script>
</body>
</html>
