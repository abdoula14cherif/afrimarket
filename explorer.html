<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer - DataSphere</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #10b981;
            --dark-bg: #1f2937;
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-light: #6b7280;
            --border-color: #e5e7eb;
            --hover-color: #f3f4f6;
            --sidebar-width: 250px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f9fafb;
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--dark-bg);
            color: white;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo i {
            font-size: 24px;
            color: var(--primary-color);
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 5px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: #d1d5db;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(79, 70, 229, 0.2);
            color: white;
        }

        .badge {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: auto;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h2 {
            font-size: 28px;
            color: var(--text-dark);
        }

        .header p {
            color: var(--text-light);
            margin-top: 5px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: white;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            width: 300px;
        }

        .search-bar input {
            border: none;
            outline: none;
            flex: 1;
            margin-left: 10px;
            font-size: 14px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid var(--border-color);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: var(--primary-color);
            background: var(--primary-color);
            color: white;
        }

        /* Datasets Grid */
        .datasets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .dataset-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .dataset-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .dataset-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .dataset-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .dataset-type {
            background: var(--hover-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-light);
        }

        .dataset-card h3 {
            margin: 10px 0;
            font-size: 18px;
        }

        .dataset-card p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .dataset-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-light);
            font-size: 13px;
        }

        .dataset-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 8px 15px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            flex: 1;
            text-align: center;
        }

        .action-btn.primary {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .action-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Loading State */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px;
            color: var(--text-light);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
        }

        /* Preview Table */
        .preview-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 14px;
        }

        .preview-table th {
            background: var(--hover-color);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-dark);
        }

        .preview-table td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .preview-table tr:hover {
            background: var(--hover-color);
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 70px;
                padding: 20px 10px;
            }
            
            .sidebar .logo h1,
            .sidebar .nav-link span {
                display: none;
            }
            
            .main-content {
                margin-left: 70px;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-bar {
                width: 100%;
            }
            
            .datasets-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-chart-network"></i>
            <h1>DataSphere</h1>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link active">
                    <i class="fas fa-compass"></i>
                    <span>Explorer</span>
                    <span class="badge" id="datasetCount">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-database"></i>
                    <span>Sources</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    <span>Rapports</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="#" class="nav-link">
                    <i class="fas fa-cog"></i>
                    <span>Paramètres</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div>
                <h2>Explorer les données</h2>
                <p>Découvrez et analysez vos datasets Supabase</p>
            </div>
            
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Rechercher un dataset..." id="searchInput">
            </div>
            
            <div class="user-profile">
                <div class="profile-img" id="userInitials">U</div>
                <span id="userName">Utilisateur</span>
            </div>
        </header>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">
                <i class="fas fa-layer-group"></i>
                Toutes les tables
            </button>
            <button class="filter-btn" data-filter="recent">
                <i class="fas fa-clock"></i>
                Récemment modifiées
            </button>
            <button class="filter-btn" data-filter="large">
                <i class="fas fa-database"></i>
                Grandes tables
            </button>
            <button class="filter-btn" data-filter="small">
                <i class="fas fa-file"></i>
                Petites tables
            </button>
        </div>

        <!-- Loading State -->
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            <p>Chargement des datasets...</p>
        </div>

        <!-- Datasets Grid -->
        <div class="datasets-grid" id="datasetsGrid">
            <!-- Chargé dynamiquement depuis Supabase -->
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="datasetModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalContent">
                <!-- Contenu chargé dynamiquement -->
            </div>
        </div>
    </div>

    <script>
        // Configuration Supabase - REMPLACEZ AVEC VOS INFOS
        const SUPABASE_URL = 'https://votre-projet.supabase.co';
        const SUPABASE_ANON_KEY = 'votre-cle-anon-supabase';

        // Initialiser Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // État global
        let allTables = [];
        let currentFilter = 'all';

        // Mapper les types de données Supabase aux icônes
        const typeIcons = {
            'sales': 'fas fa-chart-line',
            'users': 'fas fa-users',
            'products': 'fas fa-box',
            'orders': 'fas fa-shopping-cart',
            'analytics': 'fas fa-chart-bar',
            'default': 'fas fa-database'
        };

        const typeColors = {
            'sales': '#4f46e5',
            'users': '#10b981',
            'products': '#f59e0b',
            'orders': '#ef4444',
            'analytics': '#8b5cf6',
            'default': '#6b7280'
        };

        // Fonction pour obtenir les tables depuis Supabase
        async function fetchTables() {
            try {
                // Récupérer la liste des tables (via query sur information_schema)
                // Note: Cette méthode peut varier selon votre configuration Supabase
                
                // Méthode 1: Si vous avez une table de métadonnées
                const { data: datasets, error } = await supabase
                    .from('datasets_metadata') // Créez cette table dans Supabase
                    .select('*')
                    .order('created_at', { ascending: false });

                if (!error && datasets) {
                    return datasets;
                }

                // Méthode 2: Fallback - Récupérer depuis information_schema
                console.log('Fetching tables via RPC or direct query...');
                
                // Alternative: Afficher des données de démo
                return getDemoData();

            } catch (error) {
                console.error('Erreur lors du chargement des tables:', error);
                return getDemoData();
            }
        }

        // Données de démo (fallback)
        function getDemoData() {
            return [
                {
                    id: 1,
                    table_name: 'sales_2024',
                    display_name: 'Ventes 2024',
                    description: 'Données de ventes complètes avec régions et catégories',
                    row_count: 15432,
                    last_updated: '2024-01-15',
                    data_type: 'sales',
                    download_count: 342,
                    size_mb: 45.2
                },
                {
                    id: 2,
                    table_name: 'website_analytics',
                    display_name: 'Analytics Web',
                    description: 'Données de trafic et comportement utilisateurs',
                    row_count: 89245,
                    last_updated: '2024-01-14',
                    data_type: 'analytics',
                    download_count: 567,
                    size_mb: 128.7
                },
                {
                    id: 3,
                    table_name: 'customers',
                    display_name: 'Base Clients',
                    description: 'Informations clients avec segmentation',
                    row_count: 8432,
                    last_updated: '2024-01-13',
                    data_type: 'users',
                    download_count: 189,
                    size_mb: 32.1
                },
                {
                    id: 4,
                    table_name: 'products',
                    display_name: 'Catalogue Produits',
                    description: 'Inventaire et informations produits',
                    row_count: 2451,
                    last_updated: '2024-01-12',
                    data_type: 'products',
                    download_count: 234,
                    size_mb: 18.9
                },
                {
                    id: 5,
                    table_name: 'orders',
                    display_name: 'Commandes',
                    description: 'Historique des commandes et transactions',
                    row_count: 12894,
                    last_updated: '2024-01-11',
                    data_type: 'orders',
                    download_count: 421,
                    size_mb: 56.3
                }
            ];
        }

        // Formater la date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return "Aujourd'hui";
            if (diffDays === 1) return "Hier";
            if (diffDays < 7) return `Il y a ${diffDays} jours`;
            
            return date.toLocaleDateString('fr-FR');
        }

        // Afficher les tables
        function renderTables(tables) {
            const grid = document.getElementById('datasetsGrid');
            const loading = document.getElementById('loadingState');
            const countBadge = document.getElementById('datasetCount');
            
            // Mettre à jour le badge
            countBadge.textContent = tables.length;
            
            // Masquer le loading
            loading.style.display = 'none';
            grid.style.display = 'grid';
            
            // Vider la grille
            grid.innerHTML = '';
            
            tables.forEach(table => {
                const icon = typeIcons[table.data_type] || typeIcons.default;
                const color = typeColors[table.data_type] || typeColors.default;
                
                const card = document.createElement('div');
                card.className = 'dataset-card';
                card.innerHTML = `
                    <div class="dataset-header">
                        <div class="dataset-icon" style="background: ${color}">
                            <i class="${icon}"></i>
                        </div>
                        <span class="dataset-type">${table.data_type || 'Données'}</span>
                    </div>
                    <h3>${table.display_name || table.table_name}</h3>
                    <p>${table.description || 'Aucune description disponible.'}</p>
                    <div class="dataset-stats">
                        <span><i class="fas fa-table"></i> ${table.row_count.toLocaleString()} lignes</span>
                        <span><i class="fas fa-calendar"></i> ${formatDate(table.last_updated)}</span>
                        <span><i class="fas fa-hdd"></i> ${table.size_mb} MB</span>
                    </div>
                    <div class="dataset-actions">
                        <button class="action-btn" onclick="previewTable('${table.table_name}', ${table.id})">
                            <i class="fas fa-eye"></i> Aperçu
                        </button>
                        <button class="action-btn primary" onclick="exploreTable(${table.id})">
                            <i class="fas fa-rocket"></i> Explorer
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Aperçu d'une table
        async function previewTable(tableName, tableId) {
            try {
                const modal = document.getElementById('datasetModal');
                const content = document.getElementById('modalContent');
                
                // Afficher le loading dans le modal
                content.innerHTML = `
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Chargement des données...</p>
                    </div>
                `;
                modal.style.display = 'flex';
                
                // Récupérer les premières lignes de la table
                const { data: rows, error } = await supabase
                    .from(tableName)
                    .select('*')
                    .limit(10);
                
                if (error) throw error;
                
                // Générer l'aperçu
                let tableHtml = '';
                if (rows && rows.length > 0) {
                    const headers = Object.keys(rows[0]);
                    
                    tableHtml = `
                        <h2>Aperçu: ${tableName}</h2>
                        <p>Affichage des 10 premières lignes</p>
                        
                        <table class="preview-table">
                            <thead>
                                <tr>
                                    ${headers.map(h => `<th>${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${rows.map(row => `
                                    <tr>
                                        ${headers.map(h => `<td>${row[h] || ''}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        
                        <div style="margin-top: 30px; display: flex; gap: 15px;">
                            <button class="action-btn primary" onclick="downloadTable('${tableName}')">
                                <i class="fas fa-download"></i> Télécharger CSV
                            </button>
                            <button class="action-btn" onclick="exploreTable(${tableId})">
                                <i class="fas fa-chart-bar"></i> Créer un rapport
                            </button>
                        </div>
                    `;
                } else {
                    tableHtml = `
                        <h2>Aperçu: ${tableName}</h2>
                        <p>Aucune donnée disponible dans cette table.</p>
                    `;
                }
                
                content.innerHTML = tableHtml;
                
            } catch (error) {
                console.error('Erreur lors de l\'aperçu:', error);
                document.getElementById('modalContent').innerHTML = `
                    <h2>Erreur</h2>
                    <p>Impossible de charger l'aperçu: ${error.message}</p>
                `;
            }
        }

        // Explorer une table
        async function exploreTable(tableId) {
            const table = allTables.find(t => t.id === tableId);
            if (!table) return;
            
            const modal = document.getElementById('datasetModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <h2>Explorer: ${table.display_name || table.table_name}</h2>
                
                <div style="background: #f8fafc; padding: 20px; border-radius: 10px; margin: 20px 0;">
                    <h3><i class="fas fa-chart-bar"></i> Types d'analyse disponibles</h3>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px;">
                        <div style="background: white; padding: 20px; border-radius: 8px; cursor: pointer; border: 2px solid ${typeColors[table.data_type] || '#4f46e5'};" 
                             onclick="createVisualization('${table.table_name}', 'line')">
                            <i class="fas fa-chart-line" style="color: ${typeColors[table.data_type] || '#4f46e5'}; font-size: 24px;"></i>
                            <p style="margin-top: 10px;"><strong>Évolution temporelle</strong></p>
                            <p style="font-size: 12px; color: #6b7280;">Analyse des tendances</p>
                        </div>
                        
                        <div style="background: white; padding: 20px; border-radius: 8px; cursor: pointer; border: 2px solid ${typeColors[table.data_type] || '#4f46e5'};" 
                             onclick="createVisualization('${table.table_name}', 'bar')">
                            <i class="fas fa-chart-bar" style="color: ${typeColors[table.data_type] || '#4f46e5'}; font-size: 24px;"></i>
                            <p style="margin-top: 10px;"><strong>Comparaison</strong></p>
                            <p style="font-size: 12px; color: #6b7280;">Comparaison par catégorie</p>
                        </div>
                        
                        <div style="background: white; padding: 20px; border-radius: 8px; cursor: pointer; border: 2px solid ${typeColors[table.data_type] || '#4f46e5'};" 
                             onclick="createVisualization('${table.table_name}', 'pie')">
                            <i class="fas fa-chart-pie" style="color: ${typeColors[table.data_type] || '#4f46e5'}; font-size: 24px;"></i>
                            <p style="margin-top: 10px;"><strong>Répartition</strong></p>
                            <p style="font-size: 12px; color: #6b7280;">Distribution des données</p>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 30px;">
                    <h3><i class="fas fa-sliders-h"></i> Options d'analyse</h3>
                    <div style="display: flex; gap: 15px; margin-top: 15px;">
                        <button class="action-btn primary" style="flex: 1;" onclick="runAutoAnalysis('${table.table_name}')">
                            <i class="fas fa-magic"></i> Analyse automatique
                        </button>
                        <button class="action-btn" style="flex: 1;" onclick="openQueryBuilder('${table.table_name}')">
                            <i class="fas fa-code"></i> Requête SQL
                        </button>
                    </div>
                </div>
                
                <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e5e7eb;">
                    <h4>Informations techniques</h4>
                    <p><strong>Nom de la table:</strong> ${table.table_name}</p>
                    <p><strong>Lignes:</strong> ${table.row_count.toLocaleString()}</p>
                    <p><strong>Taille:</strong> ${table.size_mb} MB</p>
                    <p><strong>Dernière mise à jour:</strong> ${formatDate(table.last_updated)}</p>
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        // Filtrer les tables
        function filterTables(filter) {
            let filtered = [...allTables];
            
            switch(filter) {
                case 'recent':
                    // Filtrer les tables modifiées récemment (moins de 7 jours)
                    filtered = allTables.filter(table => {
                        const lastUpdated = new Date(table.last_updated);
                        const now = new Date();
                        const diffDays = (now - lastUpdated) / (1000 * 60 * 60 * 24);
                        return diffDays < 7;
                    });
                    break;
                    
                case 'large':
                    // Grandes tables (> 10k lignes)
                    filtered = allTables.filter(table => table.row_count > 10000);
                    break;
                    
                case 'small':
                    // Petites tables (< 1k lignes)
                    filtered = allTables.filter(table => table.row_count < 1000);
                    break;
                    
                case 'all':
                default:
                    filtered = allTables;
            }
            
            renderTables(filtered);
        }

        // Recherche
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                
                if (searchTerm === '') {
                    filterTables(currentFilter);
                    return;
                }
                
                const filtered = allTables.filter(table => 
                    (table.display_name || table.table_name).toLowerCase().includes(searchTerm) ||
                    (table.description || '').toLowerCase().includes(searchTerm) ||
                    (table.data_type || '').toLowerCase().includes(searchTerm)
                );
                
                renderTables(filtered);
            });
        }

        // Fonctions auxiliaires
        function createVisualization(tableName, type) {
            alert(`Création d'une visualisation ${type} pour la table ${tableName}`);
            // Implémentez la logique de création de graphique ici
        }

        function runAutoAnalysis(tableName) {
            alert(`Analyse automatique démarrée pour ${tableName}`);
            // Implémentez l'analyse automatique ici
        }

        function openQueryBuilder(tableName) {
            alert(`Ouverture du builder SQL pour ${tableName}`);
            // Implémentez le builder SQL ici
        }

        function downloadTable(tableName) {
            alert(`Téléchargement de ${tableName} en CSV`);
            // Implémentez le téléchargement CSV ici
        }

        function closeModal() {
            document.getElementById('datasetModal').style.display = 'none';
        }

        // Initialisation
        async function init() {
            try {
                // Charger les tables
                allTables = await fetchTables();
                
                // Afficher les tables
                renderTables(allTables);
                
                // Configurer les filtres
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentFilter = this.dataset.filter;
                        filterTables(currentFilter);
                    });
                });
                
                // Configurer la recherche
                setupSearch();
                
                // Fermer le modal en cliquant à l'extérieur
                window.addEventListener('click', function(event) {
                    const modal = document.getElementById('datasetModal');
                    if (event.target === modal) {
                        closeModal();
                    }
                });
                
            } catch (error) {
                console.error('Erreur d\'initialisation:', error);
                document.getElementById('loadingState').innerHTML = `
                    <p style="color: #ef4444;">Erreur de chargement: ${error.message}</p>
                `;
            }
        }

        // Démarrer l'application
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
