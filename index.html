<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrimarket - Inscription</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h1 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            display: none;
        }
        .success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Inscription Afrimarket</h1>
        
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <input type="email" id="email" placeholder="Email" required value="test@test.com">
            <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" required value="123456">
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>
        
        <div class="footer">
            <a href="connexion.html">Déjà un compte ?</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ============================================
        // CONFIGURATION SUPABASE (TES CLÉS)
        // ============================================
        const SUPABASE_URL = 'https://kfbstzlauxdwezgtzdsx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYnN0emxhdXhkd2V6Z3R6ZHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODYzMDQsImV4cCI6MjA4NjU2MjMwNH0.a43ze2_uKyaEgodntEvMRFEH7mNgByyfUHfzQpEKDFM';

        // Initialisation
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Client Supabase initialisé');

        const form = document.getElementById('signupForm');
        const message = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // Afficher un message
        function showMessage(text, type) {
            message.className = 'message ' + type;
            message.textContent = text;
        }

        // Gestion du formulaire
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Validation
            if (!email || !password) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return;
            }

            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.textContent = 'Inscription en cours...';
            showMessage('Inscription en cours...', 'info');

            try {
                console.log('📝 Tentative inscription:', email);

                // INSCRIPTION SIMPLE - Sans table users
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('❌ Erreur:', error);
                    throw error;
                }

                console.log('✅ Succès:', data);

                // Message de succès
                showMessage('✅ Inscription réussie ! Vérifie tes emails.', 'success');
                
                // Réinitialisation
                form.reset();

                // Redirection après 3 secondes
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 3000);

            } catch (error) {
                console.error('❌ Erreur catch:', error);
                
                let errorMessage = error.message;
                
                // Messages d'erreur compréhensibles
                if (error.message.includes('User already registered')) {
                    errorMessage = 'Cet email est déjà utilisé';
                } else if (error.message.includes('Password should be')) {
                    errorMessage = 'Mot de passe trop faible';
                } else if (error.message.includes('Invalid email')) {
                    errorMessage = 'Email invalide';
                } else if (error.message.includes('Failed to fetch')) {
                    errorMessage = 'Problème de connexion internet';
                } else if (error.message.includes('NetworkError')) {
                    errorMessage = 'Erreur réseau';
                } else if (error.message.includes('Invalid API key')) {
                    errorMessage = 'Clé API invalide (vérifie tes clés)';
                }
                
                showMessage('❌ ' + errorMessage, 'error');
                
                submitBtn.disabled = false;
                submitBtn.textContent = 'S\'inscrire';
            }
        });

        // Test de connexion au chargement
        (async function() {
            try {
                const { error } = await supabase.auth.getSession();
                if (error) {
                    console.log('⚠️ Test session:', error.message);
                } else {
                    console.log('✅ Connexion Supabase OK');
                }
            } catch (e) {
                console.log('ℹ️ Test:', e.message);
            }
        })();
    </script>
</body>
</html>
