<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscription - AFRIMARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SUPABASE OBLIGATOIRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* ============================================
           STYLES ADAPTÉS À VOTRE SITE AFRIMARKET
           ============================================ */
        :root {
            --primary-blue: #1d3557;
            --primary-red: #ef4444;
            --primary-orange: #f97316;
            --primary-green: #10b981;
            --light-bg: #f8fafc;
            --light-card: #ffffff;
            --light-text: #1e293b;
            --light-border: #e2e8f0;
            --light-gray: #94a3b8;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-text: #f1f5f9;
            --dark-border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 30px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d3557 0%, #2a5298 100%);
            color: var(--light-text);
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--dark-text);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Header - Identique à votre site */
        .app-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
        }

        .dark-mode .app-header {
            background: rgba(0, 0, 0, 0.2);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .logo-text span {
            color: var(--primary-orange);
        }

        .theme-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(15deg);
        }

        /* Carte d'inscription */
        .auth-card {
            background: var(--light-card);
            border-radius: var(--radius-lg);
            padding: 40px 30px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--light-border);
        }

        .dark-mode .auth-card {
            background: var(--dark-card);
            border-color: var(--dark-border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .dark-mode .auth-header h2 {
            color: var(--dark-text);
        }

        .auth-header p {
            color: var(--light-gray);
            font-size: 14px;
        }

        .dark-mode .auth-header p {
            color: #94a3b8;
        }

        /* Badge de parrainage */
        .referral-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            box-shadow: var(--shadow);
            animation: fadeIn 0.5s ease;
        }

        .referral-badge i {
            font-size: 32px;
        }

        .referral-badge-code {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            display: inline-block;
            margin-top: 5px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Formulaire */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--light-text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dark-mode .form-label {
            color: var(--dark-text);
        }

        .form-label.required:after {
            content: " *";
            color: var(--primary-red);
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--light-border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            background: var(--light-bg);
            color: var(--light-text);
            transition: var(--transition);
        }

        .dark-mode .form-input {
            background: var(--dark-bg);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(29, 53, 87, 0.1);
        }

        .form-input.error {
            border-color: var(--primary-red);
            background: rgba(239, 68, 68, 0.05);
        }

        .form-input[readonly] {
            background: rgba(29, 53, 87, 0.05);
            cursor: not-allowed;
        }

        .dark-mode .form-input[readonly] {
            background: rgba(255, 255, 255, 0.05);
        }

        .password-input {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--light-gray);
            cursor: pointer;
            padding: 5px;
            font-size: 16px;
        }

        .form-error {
            font-size: 12px;
            margin-top: 5px;
            color: var(--primary-red);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .form-hint {
            font-size: 12px;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-blue);
        }

        .checkbox-group label {
            font-size: 14px;
            color: var(--light-text);
        }

        .dark-mode .checkbox-group label {
            color: var(--dark-text);
        }

        .checkbox-group a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* Bouton */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            color: white;
            box-shadow: 0 4px 15px rgba(29, 53, 87, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(29, 53, 87, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Footer */
        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid var(--light-border);
        }

        .dark-mode .auth-footer {
            border-color: var(--dark-border);
        }

        .auth-footer p {
            color: var(--light-gray);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .dark-mode .auth-footer a {
            color: #60a5fa;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            border-left: 4px solid rgba(255, 255, 255, 0.5);
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .notification.info {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            backdrop-filter: blur(5px);
        }

        .loading-spinner {
            background: var(--light-card);
            padding: 40px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--light-border);
        }

        .dark-mode .loading-spinner {
            background: var(--dark-card);
            border-color: var(--dark-border);
        }

        .loading-spinner i {
            font-size: 48px;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }

        .loading-spinner p {
            color: var(--light-text);
            font-size: 16px;
            font-weight: 600;
        }

        .dark-mode .loading-spinner p {
            color: var(--dark-text);
        }

        /* Animations */
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .auth-card {
                padding: 30px 20px;
            }
            
            .auth-header h2 {
                font-size: 24px;
            }
            
            .logo-text {
                font-size: 20px;
            }
            
            .notification {
                left: 20px;
                right: 20px;
                max-width: none;
            }
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Inscription en cours...</p>
        </div>
    </div>

    <!-- Header -->
    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <a href="index.html" class="logo-container">
                    <div class="logo-icon"><i class="fas fa-store"></i></div>
                    <div class="logo-text">AFRI<span>MARKET</span></div>
                </a>
                <button class="theme-btn" id="themeBtn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <!-- Carte d'inscription -->
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-user-plus"></i> Inscription</h2>
                <p>Rejoignez AFRIMARKET et commencez à gagner</p>
            </div>

            <!-- Badge de parrainage (injecté dynamiquement) -->
            <div id="referralBadgeContainer"></div>

            <!-- Formulaire -->
            <form id="inscription-form" class="auth-form">
                <div class="form-group">
                    <label for="referral-code" class="form-label required">
                        <i class="fas fa-gift"></i> Code de parrainage
                    </label>
                    <input type="text" id="referral-code" class="form-input" 
                           placeholder="Code obligatoire" required readonly>
                    <div id="referralError" class="form-error" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="nom-complet" class="form-label required">
                        <i class="fas fa-user"></i> Nom complet
                    </label>
                    <input type="text" id="nom-complet" class="form-input" 
                           placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="telephone" class="form-label">
                        <i class="fas fa-phone"></i> Téléphone
                    </label>
                    <input type="tel" id="telephone" class="form-input" 
                           placeholder="Ex: 691234567">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="email" class="form-input" 
                           placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" class="form-input" 
                               placeholder="Minimum 6 caractères" required minlength="6">
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label required">
                        <i class="fas fa-lock"></i> Confirmer
                    </label>
                    <div class="password-input">
                        <input type="password" id="confirm-password" class="form-input" 
                               placeholder="Retapez votre mot de passe" required>
                        <button type="button" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="password-match" class="form-hint"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="conditions" required>
                    <label for="conditions">
                        J'accepte les <a href="conditions.html" target="_blank">conditions d'utilisation</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" id="submit-btn">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>

                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        let supabaseClient = null;
        let currentReferralCode = null;
        let isReferralValid = false;

        // ============================================
        // RÉCUPÉRER LE CODE DE PARRAINAGE
        // ============================================
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            
            if (!code) {
                const pathParts = window.location.pathname.split('/ref/');
                if (pathParts.length > 1) {
                    code = pathParts[1].split('/')[0].split('?')[0];
                }
            }
            
            return code ? code.toUpperCase() : null;
        }

        // ============================================
        // VALIDER LE CODE DE PARRAINAGE
        // ============================================
        async function validateReferralCode(code) {
            if (!code || !supabaseClient) return false;
            
            try {
                console.log('🔍 Validation du code:', code);
                
                const { data, error } = await supabaseClient
                    .from('referral_data')
                    .select('referral_code, is_unlocked, user_id')
                    .eq('referral_code', code)
                    .eq('is_unlocked', true)
                    .maybeSingle();
                
                if (error) {
                    console.error('❌ Erreur validation:', error);
                    return false;
                }
                
                console.log('✅ Code valide:', !!data);
                return !!data;
                
            } catch (e) {
                console.error('❌ Exception:', e);
                return false;
            }
        }

        // ============================================
        // FONCTION D'INSCRIPTION - CORRIGÉE
        // ============================================
        async function inscrireUtilisateur(userData) {
            try {
                console.log('📝 Début inscription pour:', userData.email);
                
                // 1. INSCRIPTION SUPABASE AUTH
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                    options: {
                        data: {
                            full_name: userData.nom_complet,
                            phone: userData.telephone || '',
                            role: 'user',
                            referral_used: currentReferralCode
                        },
                        emailRedirectTo: 'https://afrimarket-prod.vercel.app/dashboard.html'
                    }
                });
                
                if (authError) {
                    console.error('❌ Erreur auth:', authError);
                    
                    if (authError.message?.includes('already registered')) {
                        return { success: false, error: 'Un compte existe déjà avec cet email' };
                    }
                    
                    return { success: false, error: authError.message || 'Erreur d\'inscription' };
                }
                
                if (!authData.user) {
                    return { success: false, error: 'Erreur création utilisateur' };
                }
                
                console.log('✅ Utilisateur créé dans auth:', authData.user.id);
                
                // 2. GÉNÉRER UN CODE DE PARRAINAGE POUR LE NOUVEL UTILISATEUR
                const newReferralCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                const referralLink = `https://afrimarket-prod.vercel.app/inscription.html?ref=${newReferralCode}`;
                
                // 3. CRÉER L'ENTRÉE DANS LA TABLE users
                try {
                    const { error: userError } = await supabaseClient
                        .from('users')
                        .insert({
                            id: authData.user.id,
                            email: authData.user.email,
                            full_name: userData.nom_complet,
                            phone: userData.telephone || '',
                            role: 'user',
                            is_admin: false,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        });
                    
                    if (userError) {
                        console.error('⚠️ Erreur users:', userError);
                    } else {
                        console.log('✅ users OK');
                    }
                } catch (e) {
                    console.error('⚠️ Exception users:', e);
                }
                
                // 4. CRÉER L'ENTRÉE DANS LA TABLE referral_data
                try {
                    const { error: refError } = await supabaseClient
                        .from('referral_data')
                        .insert({
                            user_id: authData.user.id,
                            referral_code: newReferralCode,
                            referral_link: referralLink,
                            is_unlocked: false,
                            direct_count: 0,
                            level2_count: 0,
                            level3_count: 0,
                            direct_earnings: 0,
                            level2_earnings: 0,
                            level3_earnings: 0,
                            total_earned: 0,
                            created_at: new Date().toISOString(),
                            updated_at: new Date().toISOString()
                        });
                    
                    if (refError) {
                        console.error('⚠️ Erreur referral_data:', refError);
                    } else {
                        console.log('✅ referral_data OK avec code:', newReferralCode);
                    }
                } catch (e) {
                    console.error('⚠️ Exception referral_data:', e);
                }
                
                // 5. CRÉER L'ENTRÉE DANS LA TABLE balances
                try {
                    const { error: balanceError } = await supabaseClient
                        .from('balances')
                        .insert({
                            user_id: authData.user.id,
                            amount: 0,
                            currency: 'FCFA',
                            updated_at: new Date().toISOString()
                        });
                    
                    if (balanceError) {
                        console.error('⚠️ Erreur balances:', balanceError);
                    } else {
                        console.log('✅ balances OK');
                    }
                } catch (e) {
                    console.error('⚠️ Exception balances:', e);
                }
                
                // 6. CRÉER LA RELATION DE PARRAINAGE
                if (currentReferralCode) {
                    try {
                        // Récupérer le parrain
                        const { data: referrerData } = await supabaseClient
                            .from('referral_data')
                            .select('user_id')
                            .eq('referral_code', currentReferralCode)
                            .eq('is_unlocked', true)
                            .single();
                        
                        if (referrerData) {
                            console.log('✅ Parrain trouvé:', referrerData.user_id);
                            
                            // Créer la relation niveau 1
                            await supabaseClient
                                .from('referral_relationships')
                                .insert({
                                    referrer_id: referrerData.user_id,
                                    referred_user_id: authData.user.id,
                                    level: 1,
                                    commission_earned: 0,
                                    created_at: new Date().toISOString()
                                });
                            
                            console.log('✅ Relation de parrainage créée');
                        }
                    } catch (e) {
                        console.error('⚠️ Erreur création relation:', e);
                    }
                }
                
                // 7. STOCKER LES INFORMATIONS LOCALEMENT
                localStorage.setItem('afrimarket_user_id', authData.user.id);
                localStorage.setItem('afrimarket_user_email', authData.user.email);
                localStorage.setItem('afrimarket_user_name', userData.nom_complet);
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_referral_used', currentReferralCode || '');
                
                console.log('🎉 Inscription réussie !');
                
                return { 
                    success: true, 
                    message: 'Inscription réussie ! Redirection...',
                    user: authData.user 
                };
                
            } catch (error) {
                console.error('❌ ERREUR CRITIQUE:', error);
                return { 
                    success: false, 
                    error: 'Erreur technique lors de l\'inscription' 
                };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Page inscription chargée');
            
            // Initialiser Supabase
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            // Éléments DOM
            const referralInput = document.getElementById('referral-code');
            const referralError = document.getElementById('referralError');
            const submitBtn = document.getElementById('submit-btn');
            const themeBtn = document.getElementById('themeBtn');
            
            // ===== GESTION DU CODE DE PARRAINAGE =====
            const codeFromURL = getReferralCodeFromURL();
            
            if (!codeFromURL) {
                referralInput.value = 'CODE REQUIS';
                referralInput.classList.add('error');
                referralError.style.display = 'flex';
                referralError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Un code de parrainage est obligatoire';
                submitBtn.disabled = true;
                showNotification('❌ Code de parrainage requis', 'error');
                return;
            }
            
            referralInput.value = codeFromURL;
            
            // Valider le code
            showLoading(true);
            const isValid = await validateReferralCode(codeFromURL);
            showLoading(false);
            
            if (isValid) {
                currentReferralCode = codeFromURL;
                isReferralValid = true;
                referralInput.classList.remove('error');
                referralError.style.display = 'none';
                submitBtn.disabled = false;
                
                // Afficher le badge de parrainage
                document.getElementById('referralBadgeContainer').innerHTML = `
                    <div class="referral-badge">
                        <i class="fas fa-gift"></i>
                        <div style="flex:1">
                            <div style="font-weight:700; margin-bottom:5px;">🎯 Vous êtes parrainé !</div>
                            <span class="referral-badge-code">${codeFromURL}</span>
                        </div>
                    </div>
                `;
                showNotification('✅ Code de parrainage valide !', 'success');
            } else {
                referralInput.classList.add('error');
                referralError.style.display = 'flex';
                referralError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Code de parrainage invalide ou non débloqué';
                submitBtn.disabled = true;
                showNotification('❌ Code de parrainage invalide', 'error');
                return;
            }

            // ===== GESTION DU THÈME =====
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            if (savedTheme === 'dark-mode') {
                document.body.classList.add('dark-mode');
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            
            themeBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('afrimarket_theme', isDark ? 'dark-mode' : 'light-mode');
                themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // ===== TOGGLE PASSWORD =====
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const input = this.previousElementSibling;
                    if (input) {
                        const type = input.type === 'password' ? 'text' : 'password';
                        input.type = type;
                        this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                    }
                });
            });

            // ===== CONFIRMATION MOT DE PASSE =====
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirm-password');
            const matchHint = document.getElementById('password-match');
            
            confirmInput.addEventListener('input', function() {
                if (this.value.length === 0) {
                    matchHint.innerHTML = '';
                    return;
                }
                
                const match = this.value === passwordInput.value;
                matchHint.innerHTML = match 
                    ? '<span style="color: #10b981;"><i class="fas fa-check-circle"></i> Mots de passe identiques</span>'
                    : '<span style="color: #ef4444;"><i class="fas fa-times-circle"></i> Mots de passe différents</span>';
            });

            // ===== SUBMIT =====
            const form = document.getElementById('inscription-form');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Vérifications
                if (!isReferralValid || !currentReferralCode) {
                    showNotification('❌ Code de parrainage invalide', 'error');
                    return;
                }
                
                if (passwordInput.value !== confirmInput.value) {
                    showNotification('❌ Les mots de passe ne correspondent pas', 'error');
                    return;
                }
                
                if (passwordInput.value.length < 6) {
                    showNotification('❌ Le mot de passe doit contenir au moins 6 caractères', 'error');
                    return;
                }
                
                if (!document.getElementById('conditions').checked) {
                    showNotification('❌ Vous devez accepter les conditions', 'error');
                    return;
                }
                
                const email = document.getElementById('email').value.trim().toLowerCase();
                if (!email.includes('@') || !email.includes('.')) {
                    showNotification('❌ Email invalide', 'error');
                    return;
                }
                
                const nomComplet = document.getElementById('nom-complet').value.trim();
                if (nomComplet.length < 3) {
                    showNotification('❌ Nom complet trop court', 'error');
                    return;
                }
                
                // Données utilisateur
                const userData = {
                    nom_complet: nomComplet,
                    telephone: document.getElementById('telephone').value.trim(),
                    email: email,
                    password: passwordInput.value
                };
                
                // Inscription
                showLoading(true);
                
                try {
                    const result = await inscrireUtilisateur(userData);
                    
                    if (result.success) {
                        showNotification(result.message, 'success');
                        
                        // Redirection après 2 secondes
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    } else {
                        showNotification('❌ ' + result.error, 'error');
                        showLoading(false);
                    }
                } catch (error) {
                    console.error('❌ Erreur:', error);
                    showNotification('❌ Erreur technique', 'error');
                    showLoading(false);
                }
            });
        });

        // ============================================
        // UTILITAIRES
        // ============================================
        function showNotification(message, type = 'info') {
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            
            let icon = 'fa-info-circle';
            if (type === 'success') icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            
            notif.innerHTML = `
                <i class="fas ${icon}" style="font-size: 20px;"></i>
                <span style="flex: 1;">${message}</span>
            `;
            
            document.body.appendChild(notif);
            
            setTimeout(() => {
                if (notif.parentNode) {
                    notif.style.opacity = '0';
                    notif.style.transform = 'translateX(100%)';
                    setTimeout(() => notif.remove(), 300);
                }
            }, 5000);
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.style.display = show ? 'flex' : 'none';
            }
        }
    </script>
</body>
</html>
