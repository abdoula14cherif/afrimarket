<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Afrimarket</title>
    <meta name="description" content="Connectez-vous à votre compte Afrimarket">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bleu: #0066cc;
            --bleu-fonce: #004999;
            --bleu-clair: #e6f0ff;
            --rouge: #ff3333;
            --rouge-fonce: #cc0000;
            --orange: #ff9933;
            --orange-fonce: #e68a00;
            --vert: #33cc33;
            --vert-fonce: #28a428;
            --blanc: #ffffff;
            --clair: #f0f2f5;
            --gris: #6c757d;
            --noir: #1a1a1a;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-md: 0 6px 12px rgba(0,0,0,0.15);
            --gradient-primary: linear-gradient(135deg, var(--bleu), var(--orange));
            --radius: 12px;
            --radius-full: 9999px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--blanc);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: var(--gradient-primary);
            color: var(--blanc);
            padding: 2rem;
            text-align: center;
        }

        .header .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
        }

        .form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--noir);
        }

        .form-group label i {
            color: var(--bleu);
            margin-right: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--clair);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--bleu);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }

        .form-group input.error {
            border-color: var(--rouge);
        }

        .password-input {
            position: relative;
        }

        .password-input input {
            padding-right: 3rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gris);
        }

        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password a {
            color: var(--bleu);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primary);
            color: var(--blanc);
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            margin: 1.5rem 0;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--clair);
        }

        .divider span {
            background: var(--blanc);
            padding: 0 1rem;
            color: var(--gris);
            position: relative;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            padding: 0.8rem;
            border: 2px solid var(--clair);
            border-radius: var(--radius);
            background: var(--blanc);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-social.google:hover {
            background: #DB4437;
            border-color: #DB4437;
            color: var(--blanc);
        }

        .btn-social.facebook:hover {
            background: #4267B2;
            border-color: #4267B2;
            color: var(--blanc);
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--clair);
        }

        .footer a {
            color: var(--bleu);
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: var(--radius);
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 480px) {
            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">
                    <span>Afri</span><span>Market</span>
                </div>
                <h1>Content de vous revoir !</h1>
                <p>Connectez-vous à votre compte</p>
            </div>

            <div class="form">
                <!-- Message de statut -->
                <div id="message" class="message"></div>

                <!-- Formulaire de connexion -->
                <form id="loginForm">
                    <!-- Email -->
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" required placeholder="exemple@email.com">
                    </div>

                    <!-- Mot de passe -->
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Mot de passe</label>
                        <div class="password-input">
                            <input type="password" id="password" required placeholder="Votre mot de passe">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                        <div class="forgot-password">
                            <a href="#" onclick="showForgotModal()">Mot de passe oublié ?</a>
                        </div>
                    </div>

                    <!-- Bouton -->
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Se connecter
                    </button>
                </form>

                <!-- Séparateur -->
                <div class="divider">
                    <span>ou</span>
                </div>

                <!-- Connexion sociale -->
                <div class="social-login">
                    <button class="btn-social google" onclick="socialLogin('google')">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="btn-social facebook" onclick="socialLogin('facebook')">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <!-- Lien inscription -->
                <div class="footer">
                    <p>Pas encore de compte ? <a href="index.html">Inscrivez-vous</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Mot de passe oublié -->
    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 400px; width: 90%;">
            <h3 style="margin-bottom: 1rem;">Réinitialisation</h3>
            <p style="margin-bottom: 1rem;">Entrez votre email pour recevoir un lien</p>
            <input type="email" id="resetEmail" placeholder="votre@email.com" style="width: 100%; padding: 0.8rem; border: 2px solid #f0f2f5; border-radius: 8px; margin-bottom: 1rem;">
            <div style="display: flex; gap: 1rem;">
                <button onclick="closeForgotModal()" style="flex: 1; padding: 0.8rem; border: none; background: #f0f2f5; border-radius: 8px; cursor: pointer;">Annuler</button>
                <button onclick="sendResetLink()" style="flex: 1; padding: 0.8rem; border: none; background: var(--gradient-primary); color: white; border-radius: 8px; cursor: pointer;">Envoyer</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase client initialisé');

        // ============================================
        // ÉLÉMENTS DU DOM
        // ============================================
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        // ============================================
        // AFFICHAGE/MASQUAGE MOT DE PASSE
        // ============================================
        window.togglePassword = function() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        // ============================================
        // AFFICHAGE DES MESSAGES
        // ============================================
        function showMessage(text, type) {
            messageDiv.className = 'message ' + type;
            messageDiv.innerHTML = text;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // ============================================
        // CONNEXION
        // ============================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('Veuillez remplir tous les champs', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                showMessage('✅ Connexion réussie ! Redirection...', 'success');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);

            } catch (error) {
                console.error('❌ Erreur:', error);
                
                let errorMessage = error.message;
                if (error.message.includes('Invalid login credentials')) {
                    errorMessage = 'Email ou mot de passe incorrect';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMessage = 'Veuillez confirmer votre email';
                }
                
                showMessage('❌ ' + errorMessage, 'error');

                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        });

        // ============================================
        // MODAL MOT DE PASSE OUBLIÉ
        // ============================================
        window.showForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'flex';
        };

        window.closeForgotModal = function() {
            document.getElementById('forgotModal').style.display = 'none';
        };

        window.sendResetLink = async function() {
            const email = document.getElementById('resetEmail').value;
            
            if (!email) {
                alert('Veuillez entrer votre email');
                return;
            }

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) throw error;

                alert('Lien de réinitialisation envoyé !');
                closeForgotModal();

            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        };

        // ============================================
        // CONNEXION SOCIALE
        // ============================================
        window.socialLogin = async function(provider) {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: provider
                });

                if (error) throw error;

            } catch (error) {
                showMessage('Erreur: ' + error.message, 'error');
            }
        };

        // ============================================
        // VÉRIFICATION SESSION EXISTANTE
        // ============================================
        (async function checkExistingSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Optionnel : rediriger automatiquement si déjà connecté
                // window.location.href = 'dashboard.html';
            }
        })();

    </script>
</body>
</html>
