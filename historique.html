<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Historique - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
</head>
<body class="light-mode">
    <!-- En-tête fixe -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo" style="text-decoration: none; color: inherit;">
                <i class="fas fa-arrow-left"></i>
                <h1 style="margin-left: 8px; font-family: 'Montserrat', sans-serif;">Historique</h1>
            </a>
            
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn" aria-label="Changer de thème">
                    <i class="fas fa-moon"></i>
                </button>
                
                <button class="btn clear-btn" id="clear-btn">
                    <i class="fas fa-trash"></i>
                    Tout effacer
                </button>
            </div>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="main-content">
        <div class="history-container">
            <div class="history-header">
                <h2>Vos annonces sur AFRIMARKET</h2>
                <p class="history-subtitle">Historique complet de toutes vos publications</p>
            </div>
            
            <!-- Statistiques -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(37, 99, 235, 0.1); color: var(--primary-blue);">
                        <i class="fas fa-bullhorn"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="total-annonces">0</span>
                        <span class="stat-label">Total annonces</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(220, 38, 38, 0.1); color: var(--primary-red);">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="ventes-count">0</span>
                        <span class="stat-label">À vendre</span>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(249, 115, 22, 0.1); color: var(--primary-orange);">
                        <i class="fas fa-newspaper"></i>
                    </div>
                    <div class="stat-info">
                        <span class="stat-number" id="actualites-count">0</span>
                        <span class="stat-label">Actualités</span>
                    </div>
                </div>
            </div>
            
            <!-- Liste d'historique -->
            <div class="history-list" id="history-list">
                <!-- L'historique sera chargé ici -->
            </div>
            
            <!-- Pas d'historique -->
            <div class="no-history" id="no-history">
                <i class="fas fa-history"></i>
                <h3>Historique vide</h3>
                <p>Vous n'avez pas encore publié d'annonces sur AFRIMARKET</p>
                <a href="publier.html" class="btn">Publier une annonce</a>
            </div>
        </div>
    </main>

    <!-- Barre de navigation en bas -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </a>
        <a href="publier.html" class="nav-item">
            <i class="fas fa-plus-square"></i>
            <span>Publier</span>
        </a>
        <a href="historique.html" class="nav-item active">
            <i class="fas fa-history"></i>
            <span>Historique</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script>
        // Script spécifique à la page historique
        document.addEventListener('DOMContentLoaded', function() {
            initHistoryPage();
        });
        
        function initHistoryPage() {
            initTheme();
            loadHistory();
            initClearButton();
        }
        
        function loadHistory() {
            const annonces = JSON.parse(localStorage.getItem('afrimarket_annonces')) || [];
            const historyList = document.getElementById('history-list');
            const noHistory = document.getElementById('no-history');
            
            // Mettre à jour les statistiques
            updateStats(annonces);
            
            if (annonces.length === 0) {
                historyList.style.display = 'none';
                noHistory.style.display = 'block';
                return;
            }
            
            // Afficher l'historique
            historyList.style.display = 'block';
            noHistory.style.display = 'none';
            historyList.innerHTML = '';
            
            // Trier par date (plus récent en premier)
            annonces.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // Afficher chaque annonce
            annonces.forEach((annonce, index) => {
                const historyItem = createHistoryItem(annonce, index);
                historyList.appendChild(historyItem);
            });
        }
        
        function createHistoryItem(annonce, index) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.dataset.id = annonce.id;
            
            const date = new Date(annonce.date);
            const formattedDate = date.toLocaleDateString('fr-FR', {
                weekday: 'short',
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            const categoryIcon = annonce.category === 'vente' ? 'fas fa-shopping-cart' : 'fas fa-newspaper';
            const categoryColor = annonce.category === 'vente' ? 'var(--primary-blue)' : 'var(--primary-orange)';
            
            div.innerHTML = `
                <div class="history-item-header">
                    <div class="item-category" style="color: ${categoryColor};">
                        <i class="${categoryIcon}"></i>
                        <span>${annonce.category === 'vente' ? 'À vendre' : 'Actualité'}</span>
                    </div>
                    <span class="item-date">${formattedDate}</span>
                </div>
                
                <h4 class="item-title">${annonce.title}</h4>
                
                <div class="item-footer">
                    ${annonce.price ? `<span class="item-price">${annonce.price} €</span>` : '<span></span>'}
                    
                    <div class="item-actions">
                        <button class="item-btn view-btn" onclick="viewAnnonce(${annonce.id})">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="item-btn delete-btn" onclick="deleteAnnonceFromHistory(${annonce.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            
            return div;
        }
        
        function updateStats(annonces) {
            document.getElementById('total-annonces').textContent = annonces.length;
            
            const ventes = annonces.filter(a => a.category === 'vente').length;
            const actualites = annonces.filter(a => a.category === 'actualite').length;
            
            document.getElementById('ventes-count').textContent = ventes;
            document.getElementById('actualites-count').textContent = actualites;
        }
        
        function initClearButton() {
            const clearBtn = document.getElementById('clear-btn');
            
            clearBtn.addEventListener('click', function() {
                if (confirm('⚠️ Voulez-vous vraiment effacer TOUTES vos annonces ? Cette action est irréversible.')) {
                    localStorage.removeItem('afrimarket_annonces');
                    loadHistory();
                    alert('✅ Toutes les annonces ont été supprimées');
                }
            });
        }
        
        // Fonctions globales pour les boutons d'action
        window.viewAnnonce = function(id) {
            const annonces = JSON.parse(localStorage.getItem('afrimarket_annonces')) || [];
            const annonce = annonces.find(a => a.id === id);
            
            if (annonce) {
                // Créer une vue détaillée
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0, 0, 0, 0.8);
                    z-index: 2000;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                `;
                
                const formattedDate = new Date(annonce.date).toLocaleDateString('fr-FR', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                modal.innerHTML = `
                    <div style="
                        background: var(--light-card);
                        border-radius: var(--radius-lg);
                        max-width: 500px;
                        width: 100%;
                        max-height: 90vh;
                        overflow-y: auto;
                        position: relative;
                    ">
                        <button onclick="this.parentElement.parentElement.remove()" style="
                            position: absolute;
                            top: 15px;
                            right: 15px;
                            background: var(--primary-red);
                            color: white;
                            border: none;
                            width: 36px;
                            height: 36px;
                            border-radius: 50%;
                            cursor: pointer;
                            z-index: 2;
                        ">
                            <i class="fas fa-times"></i>
                        </button>
                        
                        <div style="height: 300px; overflow: hidden; border-radius: var(--radius-lg) var(--radius-lg) 0 0;">
                            <img src="${annonce.image || 'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80'}" 
                                 alt="${annonce.title}" 
                                 style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        
                        <div style="padding: var(--space-lg);">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-md);">
                                <h3 style="font-size: 1.5rem; font-weight: 700; flex: 1;">${annonce.title}</h3>
                                ${annonce.price ? `<span style="font-size: 1.5rem; font-weight: 700; color: var(--primary-red); margin-left: var(--space-md);">${annonce.price} €</span>` : ''}
                            </div>
                            
                            <div style="margin-bottom: var(--space-lg);">
                                <p style="color: var(--light-text-secondary); line-height: 1.6;">${annonce.description}</p>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; padding-top: var(--space-md); border-top: 1px solid var(--light-border);">
                                <div>
                                    <div style="display: inline-flex; align-items: center; gap: var(--space-xs); padding: 6px 12px; border-radius: var(--radius-full); background: ${annonce.category === 'vente' ? 'rgba(37, 99, 235, 0.1)' : 'rgba(249, 115, 22, 0.1)'}; color: ${annonce.category === 'vente' ? 'var(--primary-blue)' : 'var(--primary-orange)'}; font-size: 0.875rem; font-weight: 600;">
                                        <i class="${annonce.category === 'vente' ? 'fas fa-shopping-cart' : 'fas fa-newspaper'}"></i>
                                        ${annonce.category === 'vente' ? 'À vendre' : 'Actualité'}
                                    </div>
                                    <div style="font-size: 0.875rem; color: var(--light-text-secondary); margin-top: var(--space-sm);">
                                        <i class="far fa-calendar"></i> ${formattedDate}
                                    </div>
                                </div>
                                
                                ${annonce.whatsapp ? `
                                    <a href="https://wa.me/${annonce.whatsapp.replace(/\D/g, '')}" 
                                       target="_blank" 
                                       style="display: inline-flex; align-items: center; gap: var(--space-xs); padding: 10px 20px; background: #25D366; color: white; border-radius: var(--radius-full); text-decoration: none; font-weight: 500;">
                                        <i class="fab fa-whatsapp"></i>
                                        Contacter
                                    </a>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
            }
        };
        
        window.deleteAnnonceFromHistory = function(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cette annonce ?')) {
                const updatedAnnonces = deleteAnnonce(id);
                loadHistory();
                alert('✅ Annonce supprimée avec succès');
            }
        };
    </script>
</body>
</html>
