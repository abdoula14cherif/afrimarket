<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connexion - AFRIMARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary-blue: #1d3557;
            --primary-red: #ef4444;
            --primary-green: #10b981;
            --light-bg: #f8fafc;
            --light-card: #ffffff;
            --light-text: #1e293b;
            --light-border: #e2e8f0;
            --light-gray: #94a3b8;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-text: #f1f5f9;
            --dark-border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        .app-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 15px 25px;
            margin-bottom: 30px;
        }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px;
        }
        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; color: white; }
        .logo-text span { color: #ffd700; }
        .theme-btn {
            background: rgba(255,255,255,0.2); border: none; width: 40px; height: 40px;
            border-radius: 50%; color: white; font-size: 20px; cursor: pointer;
        }
        .auth-card {
            background: white; border-radius: var(--radius-lg); padding: 40px 30px;
            box-shadow: var(--shadow-lg);
        }
        .dark-mode .auth-card { background: var(--dark-card); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 {
            font-size: 28px; font-weight: 700; color: var(--primary-blue);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-label {
            font-size: 14px; font-weight: 600; color: var(--light-text);
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .form-label.required:after { content: " *"; color: var(--primary-red); }
        .form-input {
            width: 100%; padding: 14px 16px; border: 2px solid var(--light-border);
            border-radius: var(--radius-md); font-size: 14px;
            background: var(--light-bg); color: var(--light-text);
        }
        .form-input:focus {
            outline: none; border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(29,53,87,0.1);
        }
        .password-input { position: relative; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--light-gray); cursor: pointer;
        }
        .form-options {
            display: flex; justify-content: space-between;
            align-items: center; margin-top: 10px; font-size: 13px;
        }
        .checkbox-label {
            display: flex; align-items: center; gap: 6px; color: var(--light-gray);
            cursor: pointer;
        }
        .forgot-password {
            color: var(--primary-blue); text-decoration: none; font-weight: 500;
        }
        .auth-btn {
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            color: white; border: none; border-radius: var(--radius-md);
            padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(29,53,87,0.3); }
        .auth-footer {
            text-align: center; margin-top: 25px; padding-top: 25px;
            border-top: 1px solid var(--light-border);
        }
        .auth-footer a { color: var(--primary-blue); text-decoration: none; font-weight: 600; }
        .admin-link {
            margin-top: 15px; padding-top: 15px;
            border-top: 1px solid var(--light-border);
        }
        .admin-link-btn {
            background: rgba(139,92,246,0.1); color: #8b5cf6;
            border: 1px solid rgba(139,92,246,0.3); border-radius: var(--radius-sm);
            padding: 8px 12px; font-size: 12px; cursor: pointer; width: 100%;
        }
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 15px 20px;
            border-radius: var(--radius-md); color: white; font-weight: 600;
            z-index: 10000; animation: slideIn 0.3s ease;
            display: flex; align-items: center; gap: 10px; max-width: 400px;
        }
        .notification.success { background: var(--primary-green); }
        .notification.error { background: var(--primary-red); }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: center; z-index: 10001;
        }
        .loading-spinner {
            background: var(--light-card); padding: 30px; border-radius: var(--radius-md);
            text-align: center; box-shadow: var(--shadow-lg);
        }
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; margin: 0 15px; }
        }
    </style>
</head>
<body class="light-mode">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 15px;">Connexion en cours...</p>
        </div>
    </div>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <a href="index.html" class="logo-container">
                    <div class="logo-icon"><i class="fas fa-store"></i></div>
                    <div class="logo-text">AFRI<span>MARKET</span></div>
                </a>
                <button class="theme-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-sign-in-alt"></i> Connexion</h2>
                <p>Connectez-vous à votre compte AFRIMARKET</p>
            </div>

            <form id="connexionForm" class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="email" class="form-input" placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" class="form-input" placeholder="Votre mot de passe" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me"> Se souvenir de moi
                        </label>
                        <a href="#" class="forgot-password" id="forgotPassword">
                            Mot de passe oublié ?
                        </a>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>

            <div class="auth-footer">
                <p>Pas encore de compte ? <a href="index.html">S'inscrire</a></p>
                
                <div class="admin-link">
                    <button type="button" class="admin-link-btn" id="adminAccessBtn">
                        <i class="fas fa-user-shield"></i> Accès administrateur
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // CONFIGURATION ADMIN
        // ============================================
        const ADMIN_EMAIL = 'abdoula14cherif@gmail.com';
        const ADMIN_PASSWORD = 'abdoula.@5';
        let adminClickCount = 0;

        // ============================================
        // UTILITAIRES
        // ============================================
        function showNotification(message, type = 'info') {
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // ============================================
        // ✅ FONCTION DE CONNEXION CORRIGÉE - AVEC AUTH
        // ============================================
        async function connecterUtilisateur(email, password) {
            try {
                console.log('🔑 Connexion pour:', email);
                
                // === ADMIN - CONNEXION DIRECTE ===
                if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    console.log('✅ Connexion admin');
                    
                    localStorage.setItem('afrimarket_logged_in', 'true');
                    localStorage.setItem('afrimarket_user_email', email);
                    localStorage.setItem('afrimarket_user_name', 'Abdoula Cherif');
                    localStorage.setItem('afrimarket_user_role', 'admin');
                    localStorage.setItem('afrimarket_user_id', 'admin-' + Date.now());
                    
                    return {
                        success: true,
                        message: '✅ Connexion administrateur réussie !',
                        redirect: 'admin.html'
                    };
                }
                
                // === UTILISATEUR NORMAL - CONNEXION AUTH ===
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('❌ Erreur Auth:', error);
                    
                    let errorMsg = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = 'Email ou mot de passe incorrect';
                    }
                    
                    return { success: false, error: errorMsg };
                }
                
                if (!data.user) {
                    return { success: false, error: 'Erreur de connexion' };
                }
                
                console.log('✅ Connexion Auth réussie:', data.user.id);
                
                // === RÉCUPÉRER LE NOM DEPUIS LA TABLE users ===
                let userName = 'Utilisateur';
                try {
                    const { data: userData } = await supabase
                        .from('users')
                        .select('nom_complet')
                        .eq('id', data.user.id)
                        .maybeSingle();
                    
                    if (userData) {
                        userName = userData.nom_complet || 'Utilisateur';
                    }
                } catch (e) {
                    console.log('⚠️ Impossible de récupérer le nom');
                }
                
                // === STOCKER EN LOCAL ===
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', userName);
                localStorage.setItem('afrimarket_user_role', 'user');
                
                return {
                    success: true,
                    message: '✅ Connexion réussie !',
                    redirect: 'dashboard.html'
                };
                
            } catch (error) {
                console.error('❌ Erreur:', error);
                return { success: false, error: 'Erreur de connexion' };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Page connexion chargée');
            
            // === THÈME ===
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            if (savedTheme === 'dark-mode') {
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            
            themeBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('afrimarket_theme', isDark ? 'dark-mode' : 'light-mode');
                themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // === TOGGLE PASSWORD ===
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    input.type = input.type === 'password' ? 'text' : 'password';
                    this.innerHTML = input.type === 'password' ? 
                        '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                });
            });

            // === MOT DE PASSE OUBLIÉ ===
            document.getElementById('forgotPassword').addEventListener('click', function(e) {
                e.preventDefault();
                showNotification('📧 Contactez support@afrimarket.com', 'info');
            });

            // === ACCÈS ADMIN - 3 CLICS ===
            const adminBtn = document.getElementById('adminAccessBtn');
            adminBtn.addEventListener('click', function() {
                adminClickCount++;
                
                if (adminClickCount === 3) {
                    document.getElementById('email').value = ADMIN_EMAIL;
                    document.getElementById('password').value = ADMIN_PASSWORD;
                    document.getElementById('remember-me').checked = true;
                    showNotification('✅ Champs admin pré-remplis', 'success');
                    setTimeout(() => { adminClickCount = 0; }, 5000);
                } else if (adminClickCount === 1) {
                    showNotification('👆 Cliquez 2 fois de plus pour admin', 'info');
                } else if (adminClickCount === 2) {
                    showNotification('👆 1 dernier clic pour admin', 'info');
                }
            });

            // === SOUMMISSION FORMULAIRE ===
            const form = document.getElementById('connexionForm');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                
                if (!email.includes('@')) {
                    showNotification('❌ Email invalide', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showNotification('❌ Mot de passe trop court', 'error');
                    return;
                }
                
                showLoading(true);
                
                const result = await connecterUtilisateur(email, password);
                
                if (result.success) {
                    showNotification(result.message, 'success');
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1500);
                } else {
                    showNotification('❌ ' + result.error, 'error');
                    showLoading(false);
                }
            });
            
            // === VÉRIFIER SESSION EXISTANTE (PAS DE REDIRECTION AUTO) ===
            // NE RIEN FAIRE - LAISSER L'UTILISATEUR SE CONNECTER MANUELLEMENT
            console.log('✅ Page connexion prête');
        });
    </script>
</body>
</html>
