<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Afrimarket</title>
    <meta name="description" content="Créez votre compte Afrimarket gratuitement">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bleu: #0066cc;
            --bleu-fonce: #004999;
            --bleu-clair: #e6f0ff;
            --rouge: #ff3333;
            --rouge-fonce: #cc0000;
            --orange: #ff9933;
            --orange-fonce: #e68a00;
            --vert: #33cc33;
            --vert-fonce: #28a428;
            --blanc: #ffffff;
            --clair: #f0f2f5;
            --gris: #6c757d;
            --noir: #1a1a1a;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-md: 0 6px 12px rgba(0,0,0,0.15);
            --gradient-primary: linear-gradient(135deg, var(--bleu), var(--orange));
            --radius: 12px;
            --radius-full: 9999px;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: var(--blanc);
            border-radius: 24px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: var(--gradient-primary);
            color: var(--blanc);
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
        }

        .form {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--noir);
        }

        .form-group label i {
            color: var(--bleu);
            margin-right: 0.5rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--clair);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--bleu);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }

        .form-group input.error {
            border-color: var(--rouge);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .phone-group {
            display: flex;
            gap: 0.5rem;
        }

        .phone-group select {
            width: 100px;
            flex-shrink: 0;
        }

        .phone-group input {
            flex: 1;
        }

        .checkbox-group {
            margin: 1.5rem 0;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox a {
            color: var(--bleu);
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primary);
            color: var(--blanc);
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid var(--clair);
        }

        .footer a {
            color: var(--bleu);
            text-decoration: none;
            font-weight: 600;
        }

        .message {
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: var(--radius);
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            display: block;
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .password-strength {
            height: 4px;
            background: var(--clair);
            border-radius: var(--radius-full);
            margin: 0.5rem 0;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s ease;
        }

        @media (max-width: 480px) {
            .row {
                grid-template-columns: 1fr;
            }
            
            .phone-group {
                flex-direction: column;
            }
            
            .phone-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Créer un compte</h1>
                <p>Rejoignez la communauté Afrimarket</p>
            </div>

            <div class="form">
                <!-- Message de statut -->
                <div id="message" class="message"></div>

                <!-- Formulaire d'inscription -->
                <form id="signupForm">
                    <!-- Nom complet -->
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nom complet</label>
                        <input type="text" id="fullname" required placeholder="Ex: Jean Kouadio">
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" required placeholder="exemple@email.com">
                    </div>

                    <!-- Téléphone -->
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> WhatsApp</label>
                        <div class="phone-group">
                            <select id="countryCode">
                                <option value="+225">+225 (CI)</option>
                                <option value="+221">+221 (SN)</option>
                                <option value="+237">+237 (CM)</option>
                                <option value="+226">+226 (BF)</option>
                                <option value="+223">+223 (ML)</option>
                            </select>
                            <input type="tel" id="phone" required placeholder="XX XX XX XX">
                        </div>
                    </div>

                    <!-- Pays et Ville -->
                    <div class="row">
                        <div class="form-group">
                            <label><i class="fas fa-globe"></i> Pays</label>
                            <select id="country" required>
                                <option value="">Sélectionnez</option>
                                <option value="CI">Côte d'Ivoire</option>
                                <option value="SN">Sénégal</option>
                                <option value="CM">Cameroun</option>
                                <option value="BF">Burkina Faso</option>
                                <option value="ML">Mali</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-city"></i> Ville</label>
                            <input type="text" id="city" required placeholder="Ex: Abidjan">
                        </div>
                    </div>

                    <!-- Nom d'utilisateur -->
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Nom d'utilisateur</label>
                        <input type="text" id="username" required placeholder="Ex: jean123">
                    </div>

                    <!-- Mot de passe -->
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Mot de passe</label>
                        <input type="password" id="password" required placeholder="Minimum 6 caractères">
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                    </div>

                    <!-- Confirmation -->
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Confirmer le mot de passe</label>
                        <input type="password" id="confirmPassword" required placeholder="Confirmez">
                    </div>

                    <!-- Code parrainage -->
                    <div class="form-group">
                        <label><i class="fas fa-gift"></i> Code de parrainage (optionnel)</label>
                        <input type="text" id="referral" placeholder="Ex: AFRI2024">
                    </div>

                    <!-- Conditions -->
                    <div class="checkbox-group">
                        <label class="checkbox">
                            <input type="checkbox" id="terms" required>
                            <span>J'accepte les <a href="#">conditions d'utilisation</a></span>
                        </label>
                        <label class="checkbox">
                            <input type="checkbox" id="newsletter" checked>
                            <span>Recevoir les offres et actualités</span>
                        </label>
                    </div>

                    <!-- Bouton -->
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-user-plus"></i>
                        S'inscrire
                    </button>
                </form>

                <!-- Lien connexion -->
                <div class="footer">
                    <p>Déjà un compte ? <a href="connexion.html">Connectez-vous</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // ============================================
        // CONFIGURATION SUPABASE (VOS CLÉS)
        // ============================================
        const SUPABASE_URL = 'https://kfbstzlauxdwezgtzdsx.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYnN0emxhdXhkd2V6Z3R6ZHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODYzMDQsImV4cCI6MjA4NjU2MjMwNH0.a43ze2_uKyaEgodntEvMRFEH7mNgByyfUHfzQpEKDFM';

        // Initialisation de Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        console.log('✅ Supabase client initialisé');

        // ============================================
        // ÉLÉMENTS DU DOM
        // ============================================
        const form = document.getElementById('signupForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const phoneInput = document.getElementById('phone');

        // ============================================
        // FORMATAGE DU TÉLÉPHONE
        // ============================================
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 8) value = value.slice(0, 8);
            
            const parts = [];
            for (let i = 0; i < value.length; i += 2) {
                parts.push(value.slice(i, i + 2));
            }
            
            e.target.value = parts.join(' ');
        });

        // ============================================
        // FORCE DU MOT DE PASSE
        // ============================================
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strength = calculateStrength(password);
            updateStrengthBar(strength);
        });

        function calculateStrength(password) {
            let score = 0;
            if (password.length >= 6) score += 25;
            if (password.length >= 8) score += 25;
            if (/[0-9]/.test(password)) score += 25;
            if (/[A-Z]/.test(password)) score += 25;
            return Math.min(score, 100);
        }

        function updateStrengthBar(strength) {
            const bar = document.getElementById('strengthBar');
            bar.style.width = strength + '%';
            
            if (strength < 40) {
                bar.style.background = 'linear-gradient(90deg, #ff4444, #ff9933)';
            } else if (strength < 70) {
                bar.style.background = 'linear-gradient(90deg, #ff9933, #ffcc00)';
            } else {
                bar.style.background = 'linear-gradient(90deg, #33cc33, #00ff00)';
            }
        }

        // ============================================
        // AFFICHAGE DES MESSAGES
        // ============================================
        function showMessage(text, type) {
            messageDiv.className = 'message ' + type;
            messageDiv.innerHTML = text;
            
            // Disparaît après 5 secondes
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // ============================================
        // VALIDATION DU FORMULAIRE
        // ============================================
        function validateForm() {
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.replace(/\s/g, '');
            const country = document.getElementById('country').value;
            const city = document.getElementById('city').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;

            // Vérification des champs obligatoires
            if (!fullname || !email || !phone || !country || !city || !username || !password || !confirm) {
                showMessage('Veuillez remplir tous les champs obligatoires', 'error');
                return false;
            }

            // Vérification de l'email
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Email invalide', 'error');
                return false;
            }

            // Vérification du téléphone (8 chiffres)
            if (phone.length !== 8) {
                showMessage('Le numéro de téléphone doit contenir 8 chiffres', 'error');
                return false;
            }

            // Vérification du mot de passe
            if (password.length < 6) {
                showMessage('Le mot de passe doit contenir au moins 6 caractères', 'error');
                return false;
            }

            // Vérification de la confirmation
            if (password !== confirm) {
                showMessage('Les mots de passe ne correspondent pas', 'error');
                return false;
            }

            // Vérification des conditions
            if (!terms) {
                showMessage('Vous devez accepter les conditions d\'utilisation', 'error');
                return false;
            }

            return true;
        }

        // ============================================
        // INSCRIPTION AVEC SUPABASE
        // ============================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validation
            if (!validateForm()) {
                return;
            }

            // Récupération des valeurs
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const countryCode = document.getElementById('countryCode').value;
            const phone = document.getElementById('phone').value.replace(/\s/g, '');
            const country = document.getElementById('country').value;
            const city = document.getElementById('city').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const referral = document.getElementById('referral').value.trim();
            const newsletter = document.getElementById('newsletter').checked;

            // Numéro complet
            const fullPhone = countryCode + phone;

            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription...';

            try {
                console.log('📝 Tentative d\'inscription pour:', email);

                // 1. Création de l'utilisateur dans Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            fullname: fullname,
                            username: username,
                            phone: fullPhone,
                            country: country,
                            city: city
                        }
                    }
                });

                if (authError) {
                    console.error('❌ Erreur Auth:', authError);
                    throw authError;
                }

                console.log('✅ Utilisateur créé dans Auth:', authData);

                // 2. Ajout des informations dans la table users
                const { error: dbError } = await supabase
                    .from('users')
                    .insert([{
                        user_id: authData.user.id,
                        fullname: fullname,
                        username: username,
                        email: email,
                        phone: fullPhone,
                        country: country,
                        city: city,
                        referral_code: referral || null,
                        newsletter: newsletter,
                        created_at: new Date()
                    }]);

                if (dbError) {
                    console.error('⚠️ Erreur table users (non bloquante):', dbError);
                    // On continue même si l'insertion échoue
                } else {
                    console.log('✅ Profil sauvegardé dans users');
                }

                // 3. Message de succès
                showMessage('✅ Inscription réussie ! Vérifiez votre email pour confirmer votre compte.', 'success');
                
                // 4. Réinitialisation du formulaire
                form.reset();

                // 5. Redirection après 3 secondes
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 3000);

            } catch (error) {
                console.error('❌ Erreur complète:', error);
                
                // Message d'erreur adapté
                let errorMessage = error.message;
                
                if (error.message.includes('User already registered')) {
                    errorMessage = 'Cet email est déjà utilisé';
                } else if (error.message.includes('Password should be')) {
                    errorMessage = 'Mot de passe trop faible';
                } else if (error.message.includes('Invalid email')) {
                    errorMessage = 'Email invalide';
                }
                
                showMessage('❌ ' + errorMessage, 'error');

            } finally {
                // Réactiver le bouton
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
            }
        });

        // ============================================
        // TEST DE CONNEXION AU DÉMARRAGE
        // ============================================
        (async function testConnection() {
            try {
                const { error } = await supabase.from('users').select('count', { count: 'exact', head: true });
                if (error) {
                    console.warn('⚠️ Table "users" non accessible:', error.message);
                } else {
                    console.log('✅ Connexion à Supabase OK');
                }
            } catch (e) {
                console.warn('⚠️ Erreur de connexion:', e.message);
            }
        })();

    </script>
</body>
</html>
