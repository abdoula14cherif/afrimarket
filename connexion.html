<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afrimarket - Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bleu: #0066cc; --orange: #ff9933; --rouge: #ff3333; --vert: #33cc33;
            --blanc: #ffffff; --clair: #f0f2f5; --gris: #6c757d; --noir: #1a1a1a;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --gradient: linear-gradient(135deg, var(--bleu), var(--orange));
            --radius: 12px;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container { width: 100%; max-width: 400px; }
        .card {
            background: var(--blanc);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .header {
            background: var(--gradient);
            color: var(--blanc);
            padding: 2rem;
            text-align: center;
        }
        .header .logo { font-size: 2rem; font-weight: 800; }
        .form { padding: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group label i { color: var(--bleu); margin-right: 0.5rem; }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid var(--clair);
            border-radius: var(--radius);
            font-size: 1rem;
        }
        .form-group input:focus {
            border-color: var(--bleu);
            outline: none;
        }
        .password-input { position: relative; }
        .password-input input { padding-right: 3rem; }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gris);
        }
        .forgot-password {
            text-align: right;
            margin-top: 0.5rem;
        }
        .forgot-password a {
            color: var(--bleu);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--gradient);
            color: var(--blanc);
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 1.5rem 0;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .footer {
            text-align: center;
            padding-top: 1.5rem;
            border-top: 2px solid var(--clair);
        }
        .footer a { color: var(--bleu); text-decoration: none; font-weight: 600; }
        .message {
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: var(--radius);
            display: none;
        }
        .message.success { display: block; background: #d4edda; color: #155724; }
        .message.error { display: block; background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">AfriMarket</div>
                <h1>Content de vous revoir !</h1>
            </div>
            <div class="form">
                <div id="message" class="message"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" required placeholder="exemple@email.com">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Mot de passe</label>
                        <div class="password-input">
                            <input type="password" id="password" required placeholder="Votre mot de passe">
                            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                        </div>
                        <div class="forgot-password">
                            <a href="#" onclick="showForgotModal()">Mot de passe oublié ?</a>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-sign-in-alt"></i> Se connecter
                    </button>
                </form>
                <div class="footer">
                    <p>Pas encore de compte ? <a href="index.html">Inscrivez-vous</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div style="background: white; padding: 2rem; border-radius: 12px; max-width: 400px;">
            <h3>Réinitialisation</h3>
            <p>Entrez votre email</p>
            <input type="email" id="resetEmail" style="width: 100%; padding: 0.8rem; border: 2px solid #f0f2f5; border-radius: 8px; margin: 1rem 0;">
            <div style="display: flex; gap: 1rem;">
                <button onclick="closeForgotModal()" style="flex:1; padding:0.8rem;">Annuler</button>
                <button onclick="sendResetLink()" style="flex:1; padding:0.8rem; background: var(--gradient); color:white; border:none;">Envoyer</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';

            const result = await Auth.signIn(
                document.getElementById('email').value,
                document.getElementById('password').value
            );

            if (result.success) {
                message.className = 'message success';
                message.innerHTML = '✅ Connexion réussie !';
                setTimeout(() => window.location.href = 'dashboard.html', 1500);
            } else {
                message.className = 'message error';
                message.innerHTML = '❌ ' + (result.error === 'Invalid login credentials' ? 'Email ou mot de passe incorrect' : result.error);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        });

        window.showForgotModal = () => document.getElementById('forgotModal').style.display = 'flex';
        window.closeForgotModal = () => document.getElementById('forgotModal').style.display = 'none';

        window.sendResetLink = async () => {
            const email = document.getElementById('resetEmail').value;
            const result = await Auth.resetPassword(email);
            if (result.success) {
                alert('Lien envoyé !');
                closeForgotModal();
            } else {
                alert('Erreur: ' + result.error);
            }
        };
    </script>
</body>
</html>
