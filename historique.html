<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <!-- SUPABASE OBLIGATOIRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        /* Styles de débogage */
        .debug-panel {
            position: fixed;
            top: 10px;
            right: 10px;
            background: #000;
            color: #0f0;
            padding: 10px;
            font-size: 12px;
            font-family: monospace;
            z-index: 9999;
            border: 2px solid #0f0;
            border-radius: 5px;
            max-width: 300px;
            display: none;
        }
        
        .error-message {
            color: #ff4444;
            font-size: 14px;
            margin-top: 5px;
            padding: 8px;
            background: #ffeeee;
            border-radius: 5px;
            border-left: 4px solid #ff4444;
        }
        
        .success-message {
            color: #00aa00;
            font-size: 14px;
            margin-top: 5px;
            padding: 8px;
            background: #eeffee;
            border-radius: 5px;
            border-left: 4px solid #00aa00;
        }
        
        .loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Panneau de débogage -->
    <div class="debug-panel" id="debugPanel">
        <div><strong>AFRIMARKET DEBUG</strong></div>
        <div id="debugStatus">Chargement...</div>
        <button onclick="toggleDebug()" style="margin-top: 5px; padding: 3px 8px; font-size: 10px;">Debug On/Off</button>
    </div>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                <h1 style="font-family: 'Montserrat', sans-serif;">AFRI<span style="color: var(--primary-red);">MARKET</span></h1>
            </a>
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-user-plus"></i> Créer un compte</h2>
                <p>Rejoignez AFRIMARKET pour publier vos annonces</p>
                <div id="form-messages"></div>
            </div>

            <form id="inscription-form" class="auth-form">
                <!-- Nom complet -->
                <div class="form-group">
                    <label for="nom-complet" class="form-label required">
                        <i class="fas fa-user"></i> Nom complet
                    </label>
                    <input type="text" id="nom-complet" name="nom_complet" 
                           placeholder="Ex: Jean Dupont" required>
                    <div class="error-container" id="error-nom"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="email" name="email" 
                           placeholder="exemple@email.com" required>
                    <div class="error-container" id="error-email"></div>
                </div>

                <!-- Téléphone -->
                <div class="form-group">
                    <label for="telephone" class="form-label">
                        <i class="fas fa-phone"></i> Numéro de téléphone
                    </label>
                    <input type="tel" id="telephone" name="telephone" 
                           placeholder="+33 6 12 34 56 78">
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label for="password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" 
                               placeholder="Minimum 6 caractères" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Non défini</span>
                    </div>
                    <div class="error-container" id="error-password"></div>
                </div>

                <!-- Confirmation mot de passe -->
                <div class="form-group">
                    <label for="confirm-password" class="form-label required">
                        <i class="fas fa-lock"></i> Confirmer le mot de passe
                    </label>
                    <input type="password" id="confirm-password" 
                           placeholder="Retapez votre mot de passe" required>
                    <div id="password-match" class="form-hint"></div>
                </div>

                <!-- Ville -->
                <div class="form-group">
                    <label for="ville" class="form-label">
                        <i class="fas fa-map-marker-alt"></i> Ville
                    </label>
                    <input type="text" id="ville" name="ville" 
                           placeholder="Ex: Paris, Abidjan, Dakar">
                </div>

                <!-- Conditions -->
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">
                        J'accepte les <a href="#" class="link">conditions d'utilisation</a> 
                        et la <a href="#" class="link">politique de confidentialité</a>
                    </label>
                    <div class="error-container" id="error-conditions"></div>
                </div>

                <!-- Bouton d'inscription -->
                <button type="submit" class="btn auth-btn" id="submit-btn">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>

                <!-- Séparateur -->
                <div class="separator">
                    <span>ou</span>
                </div>

                <!-- Connexion sociale -->
                <div class="social-auth">
                    <button type="button" class="btn social-btn google-btn" id="google-auth">
                        <i class="fab fa-google"></i> Continuer avec Google
                    </button>
                    <button type="button" class="btn social-btn facebook-btn" id="facebook-auth">
                        <i class="fab fa-facebook-f"></i> Continuer avec Facebook
                    </button>
                </div>

                <!-- Lien vers connexion -->
                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="connexion.html" class="link">Se connecter</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- SCRIPT AUTH.JS -->
    <script src="auth.js"></script>
    
    <!-- SCRIPT PRINCIPAL -->
    <script>
        // Variables globales
        let isSubmitting = false;
        let debugMode = localStorage.getItem('afrimarket_debug') === 'true';
        
        // Fonctions utilitaires
        function showDebug(message) {
            if (debugMode) {
                console.log('🔍 ' + message);
                document.getElementById('debugStatus').textContent = message;
                document.getElementById('debugPanel').style.display = 'block';
            }
        }
        
        function toggleDebug() {
            debugMode = !debugMode;
            localStorage.setItem('afrimarket_debug', debugMode);
            document.getElementById('debugPanel').style.display = debugMode ? 'block' : 'none';
            showDebug('Debug ' + (debugMode ? 'activé' : 'désactivé'));
        }
        
        function showError(elementId, message) {
            const container = document.getElementById(elementId);
            if (container) {
                container.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${message}</div>`;
            }
        }
        
        function clearError(elementId) {
            const container = document.getElementById(elementId);
            if (container) container.innerHTML = '';
        }
        
        function showSuccess(message) {
            const messages = document.getElementById('form-messages');
            messages.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> ${message}</div>`;
            setTimeout(() => {
                messages.innerHTML = '';
            }, 5000);
        }
        
        function showLoading(show) {
            const btn = document.getElementById('submit-btn');
            const form = document.getElementById('inscription-form');
            if (show) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription en cours...';
                form.classList.add('loading');
                isSubmitting = true;
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
                form.classList.remove('loading');
                isSubmitting = false;
            }
        }
        
        // Fonction de validation
        function validateForm() {
            let isValid = true;
            
            // Nom complet
            const nom = document.getElementById('nom-complet').value.trim();
            if (nom.length < 2) {
                showError('error-nom', 'Le nom doit contenir au moins 2 caractères');
                isValid = false;
            } else {
                clearError('error-nom');
            }
            
            // Email
            const email = document.getElementById('email').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('error-email', 'Adresse email invalide');
                isValid = false;
            } else {
                clearError('error-email');
            }
            
            // Mot de passe
            const password = document.getElementById('password').value;
            if (password.length < 6) {
                showError('error-password', 'Le mot de passe doit contenir au moins 6 caractères');
                isValid = false;
            } else {
                clearError('error-password');
            }
            
            // Confirmation mot de passe
            const confirm = document.getElementById('confirm-password').value;
            if (password !== confirm) {
                showError('error-password', 'Les mots de passe ne correspondent pas');
                isValid = false;
            }
            
            // Conditions
            const conditions = document.getElementById('conditions').checked;
            if (!conditions) {
                showError('error-conditions', 'Vous devez accepter les conditions');
                isValid = false;
            } else {
                clearError('error-conditions');
            }
            
            return isValid;
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            showDebug('Page chargée');
            
            // Activer debug si dans l'URL
            if (window.location.search.includes('debug=true')) {
                debugMode = true;
                localStorage.setItem('afrimarket_debug', 'true');
                toggleDebug();
            }
            
            // Gestion du thème
            const themeBtn = document.getElementById('theme-btn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
                showDebug('Thème changé');
            });
            
            // Toggle mot de passe
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? 
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // Force du mot de passe
            passwordInput.addEventListener('input', function() {
                const strength = checkPasswordStrength(this.value);
                const bar = document.querySelector('.strength-bar');
                const text = document.querySelector('.strength-text');
                
                bar.style.width = strength.percent + '%';
                bar.style.background = strength.color;
                text.textContent = strength.text;
                text.style.color = strength.color;
            });
            
            // Vérification confirmation mot de passe
            const confirmInput = document.getElementById('confirm-password');
            const matchHint = document.getElementById('password-match');
            
            confirmInput.addEventListener('input', function() {
                const match = this.value === passwordInput.value;
                matchHint.textContent = match ? '✅ Mots de passe identiques' : '❌ Mots de passe différents';
                matchHint.style.color = match ? 'var(--success)' : 'var(--primary-red)';
            });
            
            // Soumission formulaire
            const form = document.getElementById('inscription-form');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (isSubmitting) {
                    showDebug('Déjà en cours de soumission');
                    return;
                }
                
                showDebug('Début validation formulaire');
                
                // Validation
                if (!validateForm()) {
                    showDebug('Échec validation');
                    return;
                }
                
                // Données utilisateur
                const userData = {
                    nom_complet: document.getElementById('nom-complet').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    telephone: document.getElementById('telephone').value.trim() || null,
                    ville: document.getElementById('ville').value.trim() || null,
                    password: document.getElementById('password').value
                };
                
                showDebug(`Données: ${userData.email}`);
                showLoading(true);
                
                try {
                    // Vérifier que la fonction existe
                    if (typeof window.inscrireUtilisateur !== 'function') {
                        throw new Error('Service d\'inscription indisponible. Rechargez la page.');
                    }
                    
                    showDebug('Appel inscription...');
                    
                    // Appeler la fonction d'inscription
                    const result = await window.inscrireUtilisateur(userData);
                    
                    showDebug('Résultat reçu: ' + (result.success ? 'SUCCÈS' : 'ÉCHEC'));
                    
                    if (result.success) {
                        showSuccess(result.message || 'Inscription réussie !');
                        showDebug('Redirection dans 2 secondes...');
                        
                        // Stocker les infos utilisateur
                        localStorage.setItem('afrimarket_temp_user', JSON.stringify({
                            email: userData.email,
                            nom: userData.nom_complet
                        }));
                        
                        // Redirection
                        setTimeout(() => {
                            window.location.href = 'connexion.html?inscription=success';
                        }, 2000);
                        
                    } else {
                        // Messages d'erreur personnalisés
                        let errorMsg = result.error;
                        if (result.error.includes('already registered')) {
                            errorMsg = 'Un compte existe déjà avec cet email. <a href="connexion.html">Se connecter ?</a>';
                        } else if (result.error.includes('password')) {
                            errorMsg = 'Le mot de passe est trop faible (min. 6 caractères)';
                        } else if (result.error.includes('email')) {
                            errorMsg = 'Adresse email invalide';
                        }
                        
                        showError('form-messages', errorMsg);
                        showLoading(false);
                    }
                    
                } catch (error) {
                    console.error('ERREUR CATCH:', error);
                    showError('form-messages', 'Erreur technique: ' + error.message);
                    showLoading(false);
                    showDebug('Erreur: ' + error.message);
                }
            });
            
            // Connexion sociale (placeholder)
            document.getElementById('google-auth').addEventListener('click', function() {
                alert('Fonctionnalité Google en développement');
            });
            
            document.getElementById('facebook-auth').addEventListener('click', function() {
                alert('Fonctionnalité Facebook en développement');
            });
            
            // Vérifier l'état initial
            setTimeout(() => {
                showDebug(`Fonctions: ${typeof window.inscrireUtilisateur}`);
                showDebug(`Supabase: ${typeof window.supabase}`);
                
                // Message d'aide si problème
                if (typeof window.inscrireUtilisateur === 'undefined') {
                    showError('form-messages', 
                        'Problème de chargement. <a href="javascript:location.reload()">Rafraîchir la page</a>');
                }
            }, 1000);
        });
        
        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const levels = [
                { percent: 20, color: '#ef4444', text: 'Très faible' },
                { percent: 40, color: '#f59e0b', text: 'Faible' },
                { percent: 60, color: '#eab308', text: 'Moyen' },
                { percent: 80, color: '#10b981', text: 'Bon' },
                { percent: 100, color: '#3b82f6', text: 'Fort' }
            ];

            return levels[Math.min(score, 4)];
        }
        
        // Exposer les fonctions de debug
        window.toggleDebug = toggleDebug;
    </script>
</body>
</html>
