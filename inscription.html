<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <!-- IMPORTANT: Inclure Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body class="light-mode">
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                <h1 style="font-family: 'Montserrat', sans-serif;">AFRI<span style="color: var(--primary-red);">MARKET</span></h1>
            </a>
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-user-plus"></i> Créer un compte</h2>
                <p>Rejoignez AFRIMARKET pour publier vos annonces</p>
            </div>

            <form id="inscription-form" class="auth-form">
                <!-- Nom complet -->
                <div class="form-group">
                    <label for="nom-complet" class="form-label required">
                        <i class="fas fa-user"></i> Nom complet
                    </label>
                    <input type="text" id="nom-complet" name="nom_complet" 
                           placeholder="Ex: Jean Dupont" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="email" name="email" 
                           placeholder="exemple@email.com" required>
                </div>

                <!-- Téléphone -->
                <div class="form-group">
                    <label for="telephone" class="form-label">
                        <i class="fas fa-phone"></i> Numéro de téléphone
                    </label>
                    <input type="tel" id="telephone" name="telephone" 
                           placeholder="+33 6 12 34 56 78">
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label for="password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" 
                               placeholder="Minimum 8 caractères" required minlength="8">
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                        <span class="strength-text">Faible</span>
                    </div>
                </div>

                <!-- Confirmation mot de passe -->
                <div class="form-group">
                    <label for="confirm-password" class="form-label required">
                        <i class="fas fa-lock"></i> Confirmer le mot de passe
                    </label>
                    <input type="password" id="confirm-password" 
                           placeholder="Retapez votre mot de passe" required>
                    <div id="password-match" class="form-hint"></div>
                </div>

                <!-- Ville -->
                <div class="form-group">
                    <label for="ville" class="form-label">
                        <i class="fas fa-map-marker-alt"></i> Ville
                    </label>
                    <input type="text" id="ville" name="ville" 
                           placeholder="Ex: Paris, Abidjan, Dakar">
                </div>

                <!-- Conditions -->
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">
                        J'accepte les <a href="#" class="link">conditions d'utilisation</a> 
                        et la <a href="#" class="link">politique de confidentialité</a>
                    </label>
                </div>

                <!-- Bouton d'inscription -->
                <button type="submit" class="btn auth-btn" id="submit-btn">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>

                <!-- Séparateur -->
                <div class="separator">
                    <span>ou</span>
                </div>

                <!-- Connexion sociale -->
                <div class="social-auth">
                    <button type="button" class="btn social-btn google-btn" id="google-auth">
                        <i class="fab fa-google"></i> Continuer avec Google
                    </button>
                    <button type="button" class="btn social-btn facebook-btn" id="facebook-auth">
                        <i class="fab fa-facebook-f"></i> Continuer avec Facebook
                    </button>
                </div>

                <!-- Lien vers connexion -->
                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="connexion.html" class="link">Se connecter</a></p>
                </div>
            </form>
        </div>
    </main>

    <!-- Script de vérification pour Supabase -->
    <script>
        // Vérifier que Supabase est chargé
        function verifierSupabase() {
            if (typeof supabase === 'undefined') {
                console.error('❌ Supabase non chargé !');
                console.log('Tentative de rechargement...');
                
                // Charger Supabase dynamiquement
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js';
                script.onload = function() {
                    console.log('✅ Supabase chargé dynamiquement');
                    // Recharger auth.js après Supabase
                    chargerAuthJS();
                };
                document.head.appendChild(script);
                return false;
            }
            console.log('✅ Supabase est prêt');
            return true;
        }
        
        // Charger auth.js après Supabase
        function chargerAuthJS() {
            // Supprimer l'ancien script s'il existe
            const oldScript = document.querySelector('script[src="auth.js"]');
            if (oldScript) oldScript.remove();
            
            // Créer un nouveau script
            const script = document.createElement('script');
            script.src = 'auth.js';
            script.onload = function() {
                console.log('✅ auth.js chargé avec succès');
            };
            script.onerror = function() {
                console.error('❌ Erreur chargement auth.js');
            };
            document.body.appendChild(script);
        }
        
        // Vérifier au chargement
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔄 Vérification des dépendances...');
            verifierSupabase();
        });
    </script>
    
    <!-- Charger auth.js -->
    <script src="auth.js"></script>
    
    <!-- Votre script principal -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Gestion du thème
            const themeBtn = document.getElementById('theme-btn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
            });

            // Toggle mot de passe
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? 
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            // Force du mot de passe
            passwordInput.addEventListener('input', function() {
                const strength = checkPasswordStrength(this.value);
                const bar = document.querySelector('.strength-bar');
                const text = document.querySelector('.strength-text');
                
                bar.style.width = strength.percent + '%';
                bar.style.background = strength.color;
                text.textContent = strength.text;
                text.style.color = strength.color;
            });

            // Vérification confirmation mot de passe
            const confirmInput = document.getElementById('confirm-password');
            const matchHint = document.getElementById('password-match');
            
            confirmInput.addEventListener('input', function() {
                const match = this.value === passwordInput.value;
                matchHint.textContent = match ? '✅ Mots de passe identiques' : '❌ Mots de passe différents';
                matchHint.style.color = match ? 'var(--success)' : 'var(--primary-red)';
            });

            // Soumission formulaire - VERSION CORRIGÉE
            const form = document.getElementById('inscription-form');
            const submitBtn = document.getElementById('submit-btn');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                console.log('🔄 Début de l\'inscription...');
                
                // Vérifier que la fonction existe
                if (typeof inscrireUtilisateur === 'undefined') {
                    alert('❌ Erreur: Service d\'inscription non disponible. Veuillez rafraîchir la page.');
                    return;
                }

                // Validation
                if (passwordInput.value !== confirmInput.value) {
                    alert('❌ Les mots de passe ne correspondent pas');
                    return;
                }
                
                // Validation longueur mot de passe
                if (passwordInput.value.length < 6) {
                    alert('❌ Le mot de passe doit contenir au moins 6 caractères');
                    return;
                }

                // Données utilisateur
                const userData = {
                    nom_complet: document.getElementById('nom-complet').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    telephone: document.getElementById('telephone').value.trim() || null,
                    ville: document.getElementById('ville').value.trim() || null,
                    password: passwordInput.value
                };
                
                // Validation email basique
                if (!userData.email.includes('@') || !userData.email.includes('.')) {
                    alert('❌ Veuillez entrer une adresse email valide');
                    return;
                }
                
                // Validation nom complet
                if (userData.nom_complete.length < 2) {
                    alert('❌ Le nom complet doit contenir au moins 2 caractères');
                    return;
                }

                console.log('📝 Données à envoyer:', { ...userData, password: '***' });

                // Désactiver bouton
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription en cours...';

                try {
                    // Appeler la fonction d'inscription
                    console.log('📤 Appel de inscrireUtilisateur...');
                    const result = await inscrireUtilisateur(userData);
                    console.log('📥 Résultat:', result);
                    
                    if (result.success) {
                        alert('✅ ' + result.message);
                        // Petite pause avant redirection
                        setTimeout(() => {
                            window.location.href = 'index.html?welcome=true';
                        }, 1500);
                    } else {
                        alert('❌ Erreur: ' + result.error);
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
                    }
                } catch (error) {
                    console.error('💥 Erreur catch:', error);
                    alert('❌ Erreur technique: ' + (error.message || 'Veuillez réessayer'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
                }
            });
            
            // Test: Vérifier que tout fonctionne
            setTimeout(() => {
                console.log('🧪 Test de disponibilité des fonctions:');
                console.log('- inscrireUtilisateur:', typeof inscrireUtilisateur);
                console.log('- supabase:', typeof supabase);
                
                if (typeof inscrireUtilisateur === 'undefined') {
                    console.warn('⚠️ Fonction inscrireUtilisateur non trouvée!');
                }
            }, 1000);
        });

        function checkPasswordStrength(password) {
            let score = 0;
            if (password.length >= 8) score++;
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;

            const levels = [
                { percent: 25, color: '#ef4444', text: 'Faible' },
                { percent: 50, color: '#f59e0b', text: 'Moyen' },
                { percent: 75, color: '#10b981', text: 'Bon' },
                { percent: 100, color: '#3b82f6', text: 'Fort' }
            ];

            return levels[Math.min(score, 3)];
        }
    </script>
</body>
</html>
