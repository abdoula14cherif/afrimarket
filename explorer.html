<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <!-- IMPORTANT: Inclure Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification.success {
            background: #10b981;
        }
        
        .notification.error {
            background: #ef4444;
        }
        
        .notification.info {
            background: #3b82f6;
        }
        
        .notification.warning {
            background: #f59e0b;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .loading-spinner {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        
        .referral-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        
        .referral-badge i {
            font-size: 20px;
        }
        
        .referral-code {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-family: monospace;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Overlay de chargement -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 15px;">Inscription en cours...</p>
        </div>
    </div>

    <header class="header">
        <div class="header-container">
            <a href="dashboard.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                <h1 style="font-family: 'Montserrat', sans-serif;">AFRI<span style="color: var(--primary-red);">MARKET</span></h1>
            </a>
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-user-plus"></i> Créer un compte</h2>
                <p>Rejoignez AFRIMARKET et gagnez de l'argent</p>
            </div>

            <!-- BADGE DE PARRAINAGE (visible si code présent) -->
            <div id="referralBadge" style="display: none;" class="referral-badge">
                <i class="fas fa-gift"></i>
                <div style="flex: 1;">
                    <strong>🎯 Vous êtes parrainé !</strong>
                    <span id="referralMessage" style="margin-left: 5px;"></span>
                </div>
            </div>

            <form id="inscription-form" class="auth-form">
                <div class="form-group">
                    <label for="nom-complet" class="form-label required">
                        <i class="fas fa-user"></i> Nom complet
                    </label>
                    <input type="text" id="nom-complet" name="nom_complet" 
                           placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="telephone" class="form-label">
                        <i class="fas fa-phone"></i> Téléphone (optionnel)
                    </label>
                    <input type="tel" id="telephone" name="telephone" 
                           placeholder="Ex: +237 6 00 00 00 00">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="email" name="email" 
                           placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" 
                               placeholder="Minimum 6 caractères" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label required">
                        <i class="fas fa-lock"></i> Confirmer le mot de passe
                    </label>
                    <input type="password" id="confirm-password" 
                           placeholder="Retapez votre mot de passe" required>
                    <div id="password-match" class="form-hint"></div>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">
                        J'accepte les <a href="conditions.html" target="_blank">conditions d'utilisation</a>
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">
                        Recevoir les offres et actualités (optionnel)
                    </label>
                </div>

                <button type="submit" class="btn auth-btn" id="submit-btn">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>

                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="connexion.html" class="link">Se connecter</a></p>
                </div>
            </form>
            
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--light-border); text-align: center; font-size: 13px; color: var(--light-gray);">
                <i class="fas fa-shield-alt"></i> Vos données sont sécurisées
            </div>
        </div>
    </main>

    <script>
        // Configuration Supabase

        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        let supabaseClient = null;

        // Fonction pour afficher les notifications
        function showNotification(message, type = 'info') {
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 
                               type === 'error' ? 'fa-exclamation-circle' : 
                               type === 'warning' ? 'fa-exclamation-triangle' :
                               'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notif.remove(), 300);
            }, 5000);
        }
        
        // Fonction pour montrer/cacher le loading
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const submitBtn = document.getElementById('submit-btn');
            
            if (show) {
                overlay.style.display = 'flex';
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inscription...';
            } else {
                overlay.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire';
            }
        }
        
        // Fonction pour récupérer le code de parrainage depuis l'URL
        function getReferralCodeFromURL() {
            // Format 1: ?ref=ABC123
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            
            // Format 2: /ref/ABC123
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                // Nettoyer
                if (code) code = code.split('/')[0].split('?')[0];
            }
            
            return code ? code.toUpperCase() : null;
        }
        
        // Fonction pour vérifier si le code de parrainage est valide
        async function validateReferralCode(code) {
            if (!code || !supabaseClient) return null;
            
            try {
                const { data, error } = await supabaseClient
                    .from('referral_data')
                    .select('user_id, referral_code, is_unlocked')
                    .eq('referral_code', code)
                    .single();
                
                if (error || !data) {
                    console.log('Code de parrainage invalide:', code);
                    return null;
                }
                
                // Vérifier que le parrain a DÉBLOQUÉ son lien
                if (!data.is_unlocked) {
                    console.log('Le parrain n\'a pas débloqué son lien');
                    return null;
                }
                
                console.log('✅ Code de parrainage valide:', code);
                return data;
                
            } catch (error) {
                console.error('Erreur validation code:', error);
                return null;
            }
        }
        
        // Fonction d'inscription avec parrainage

                if (referralCode) {

                    console.log('🎯 Parrainage détecté avec code:', referralCode);
                }
                
                // Inscription avec Supabase - AVEC PARRAINAGE
const userMetadata = {

};

});
                
                if (error) {

                    let errorMsg = error.message;

                    } else if (error.message.includes('password')) {

                    }
                    
                    return { success: false, error: errorMsg };
                }
                
                console.log('✅ Inscription réussie:', data);
                console.log('🎯 Code de parrainage transmis:', referralCode || 'Aucun');
                
                // Stocker les infos utilisateur
                if (data.user) {

                    localStorage.setItem('afrimarket_user_name', userData.nom_complet);
                    localStorage.setItem('afrimarket_logged_in', 'true');
                    
                    // Stocker le code de parrainage utilisé
                    if (referralCode) {
                        localStorage.setItem('afrimarket_referral_used', referralCode);
                    }
                }
                
                return {

            } catch (error) {

// CODE DE PARRAINAGE - À AJOUTER ICI

// Variable globale pour stocker le code de parrainage
let referralCode = null;

// Fonction pour récupérer le code depuis l'URL
function getReferralCodeFromURL() {
    // Format 1: ?ref=ABC123
    const urlParams = new URLSearchParams(window.location.search);
    let code = urlParams.get('ref');
    
    // Format 2: /ref/ABC123 (via Vercel)
    if (!code && window.location.pathname.includes('/ref/')) {
        code = window.location.pathname.split('/ref/')[1];
        if (code) code = code.split('/')[0].split('?')[0];
    }
    
    // Format 3: /parrainage/ABC123
    if (!code && window.location.pathname.includes('/parrainage/')) {
        code = window.location.pathname.split('/parrainage/')[1];
        if (code) code = code.split('/')[0].split('?')[0];
    }
    
    // Format 4: /invitation/ABC123
    if (!code && window.location.pathname.includes('/invitation/')) {
        code = window.location.pathname.split('/invitation/')[1];
        if (code) code = code.split('/')[0].split('?')[0];
    }
    
    return code ? code.toUpperCase() : null;
}

// Afficher un badge si code de parrainage détecté
function showReferralBadge(code) {
    const badge = document.createElement('div');
    badge.style.cssText = `
        background: linear-gradient(135deg, #f59e0b, #d97706);
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
    `;
    badge.innerHTML = `
        <i class="fas fa-gift" style="font-size: 20px;"></i>
        <div style="flex: 1;">
            <strong>🎯 Vous êtes parrainé !</strong>
            <span style="margin-left: 5px;">Code: <span style="background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-family: monospace; font-weight: 600;">${code}</span></span>
        </div>
    `;
    
    // Insérer le badge en haut du formulaire
    const form = document.getElementById('inscription-form');
    if (form) {
        form.parentNode.insertBefore(badge, form);
    }
}

// Détecter le code au chargement
const codeFromURL = getReferralCodeFromURL();
if (codeFromURL) {
    referralCode = codeFromURL;
    console.log('✅ Code de parrainage détecté:', codeFromURL);
    
    // Afficher le badge après que le DOM soit chargé

}
// ============================================
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Page inscription chargée');
            
            // Initialiser Supabase
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true,
                        detectSessionInUrl: true
                    }
                });
                console.log('✅ Supabase initialisé');
                
                // VÉRIFIER LE CODE DE PARRAINAGE DANS L'URL
                const codeFromURL = getReferralCodeFromURL();
                
                if (codeFromURL) {
                    console.log('🔍 Vérification du code:', codeFromURL);
                    
                    // Valider le code
                    const referralData = await validateReferralCode(codeFromURL);
                    
                    if (referralData) {
                        referralCode = codeFromURL;
                        
                        // Afficher le badge de parrainage
                        const badge = document.getElementById('referralBadge');
                        const message = document.getElementById('referralMessage');
                        
                        badge.style.display = 'flex';
                        message.innerHTML = `Code: <span class="referral-code">${codeFromURL}</span>`;
                        
                        showNotification(`🎉 Vous êtes parrainé ! Code: ${codeFromURL}`, 'success');
                    } else {
                        // Code invalide
                        console.log('Code de parrainage invalide ou non débloqué');
                        showNotification('⚠️ Ce lien de parrainage n\'est pas valide ou n\'a pas été débloqué', 'warning');
                    }
                }
                
                // Vérifier si un message est présent dans l'URL
                const urlParams = new URLSearchParams(window.location.search);
                const message = urlParams.get('message');
                if (message) {
                    showNotification(decodeURIComponent(message), 'info');
                }
                
            } else {
                showNotification('Erreur: Supabase non chargé', 'error');
            }
            
            // Gestion du thème
            const themeBtn = document.getElementById('theme-btn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
            });
            
            // Toggle mot de passe
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? 
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // Vérification confirmation mot de passe
            const confirmInput = document.getElementById('confirm-password');
            const matchHint = document.getElementById('password-match');
            
            confirmInput.addEventListener('input', function() {
                const match = this.value === passwordInput.value;
                if (this.value.length > 0) {
                    matchHint.textContent = match ? '✅ Mots de passe identiques' : '❌ Mots de passe différents';
                    matchHint.style.color = match ? '#10b981' : '#ef4444';
                } else {
                    matchHint.textContent = '';
                }
            });
            
            // Soumission formulaire
            const form = document.getElementById('inscription-form');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Formulaire soumis');
                
                // Validation
                if (passwordInput.value !== confirmInput.value) {
                    showNotification('Les mots de passe ne correspondent pas', 'error');
                    return;
                }
                
                if (passwordInput.value.length < 6) {
                    showNotification('Le mot de passe doit contenir au moins 6 caractères', 'error');
                    return;
                }
                
                // Données utilisateur
                const userData = {
                    nom_complet: document.getElementById('nom-complet').value.trim(),
                    telephone: document.getElementById('telephone').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: passwordInput.value,
                    newsletter: document.getElementById('newsletter').checked
                };
                
                // Validation email
                if (!userData.email.includes('@')) {
                    showNotification('Email invalide', 'error');
                    return;
                }
                
                // Validation nom complet
                if (userData.nom_complet.length < 3) {
                    showNotification('Nom complet trop court', 'error');
                    return;
                }
                
                // Vérifier conditions
                if (!document.getElementById('conditions').checked) {
                    showNotification('Vous devez accepter les conditions', 'error');
                    return;
                }
                
                // Afficher le loading
                showLoading(true);
                
                try {
                    // Appeler la fonction d'inscription
                    const result = await inscrireUtilisateur(userData);
                    
                    if (result.success) {
                        showNotification(result.message, 'success');
                        
                        // Message si parrainage
                        if (referralCode) {
                            showNotification(`🎯 Inscription avec code: ${referralCode}`, 'success');
                        }
                        
                        // Message spécifique si confirmation email nécessaire
                        if (result.requiresEmailConfirmation) {
                            showNotification('📧 Vérifiez votre email pour confirmer votre compte', 'info');
                            
                            setTimeout(() => {
                                window.location.href = 'connexion.html?message=Vérifiez votre email pour confirmer votre compte';
                            }, 3000);
                            
                        } else {
                            // REDIRECTION VERS DASHBOARD.HTML
                            showNotification('✅ Inscription réussie ! Redirection...', 'success');
                            
                            setTimeout(() => {
                                console.log('Redirection vers dashboard.html');
                                window.location.href = 'dashboard.html';
                            }, 2000);
                        }
                        
                    } else {
                        showNotification('❌ ' + result.error, 'error');
                        showLoading(false);
                    }
                    
                } catch (error) {
                    console.error('Erreur catch:', error);
                    showNotification('❌ Erreur technique: ' + error.message, 'error');
                    showLoading(false);
                }
            });
            
            // Pré-remplir l'email si fourni dans l'URL (pour les tests)
            const urlParams = new URLSearchParams(window.location.search);
            const emailParam = urlParams.get('email');
            if (emailParam) {
                document.getElementById('email').value = decodeURIComponent(emailParam);
            }
            
            // Vérifier que tout est prêt
            setTimeout(() => {
                if (!supabaseClient) {
                    showNotification('⚠️ Supabase non initialisé. Rechargez la page.', 'error');
                }
            }, 1000);
        });
    </script>
