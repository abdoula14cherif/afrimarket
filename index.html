<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            color: #1d3557;
            text-align: center;
            margin-bottom: 30px;
        }
        .code-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }
        .code-badge.valid {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #1d3557;
            outline: none;
        }
        input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(29,53,87,0.3);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #1d3557;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 AFRIMARKET</h1>
        
        <div id="codeBadge" class="code-badge">
            🔍 Vérification du code de parrainage...
        </div>

        <form id="inscriptionForm">
            <input type="text" id="referralCode" placeholder="Code de parrainage" readonly>
            
            <input type="text" id="fullName" placeholder="Nom complet" required>
            
            <input type="email" id="email" placeholder="Email" required>
            
            <input type="password" id="password" placeholder="Mot de passe (6 caractères min)" minlength="6" required>
            
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
            
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>

        <div id="message"></div>
        
        <div class="link">
            <a href="connexion.html">Déjà un compte ? Se connecter</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Récupérer le code de l'URL
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            return code ? code.toUpperCase() : null;
        }

        // Valider le code avec la fonction RPC
        async function validateReferralCode(code) {
            if (!code) return false;
            
            const { data, error } = await supabase
                .rpc('check_referral_code', { p_code: code });
            
            if (error) {
                console.error('Erreur validation:', error);
                return false;
            }
            
            return data?.valid || false;
        }

        // Inscription
        async function inscrireUtilisateur(userData) {
            try {
                // 1. Créer l'utilisateur dans Auth
                const { data, error } = await supabase.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                    options: {
                        data: {
                            nom_complet: userData.fullName,
                            role: 'user',
                            referral_code: userData.referralCode
                        }
                    }
                });
                
                if (error) throw error;
                if (!data.user) throw new Error('Erreur création utilisateur');
                
                // 2. Initialiser les données avec la fonction RPC
                const { error: initError } = await supabase
                    .rpc('init_new_user', {
                        p_user_id: data.user.id,
                        p_email: data.user.email,
                        p_nom_complet: userData.fullName
                    });
                
                if (initError) {
                    console.error('Erreur initialisation:', initError);
                }
                
                // 3. Stocker en localStorage
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', userData.fullName);
                localStorage.setItem('afrimarket_user_role', 'user');
                
                return { success: true };
                
            } catch (error) {
                console.error('Erreur inscription:', error);
                return { 
                    success: false, 
                    error: error.message.includes('already registered') 
                        ? 'Cet email est déjà utilisé' 
                        : 'Erreur technique'
                };
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            const code = getReferralCodeFromURL();
            const referralInput = document.getElementById('referralCode');
            const submitBtn = document.getElementById('submitBtn');
            const badge = document.getElementById('codeBadge');
            
            if (!code) {
                badge.innerHTML = '❌ Code de parrainage requis';
                badge.classList.remove('valid');
                submitBtn.disabled = true;
                return;
            }
            
            referralInput.value = code;
            
            const isValid = await validateReferralCode(code);
            
            if (isValid) {
                badge.innerHTML = `✅ Code valide: <strong>${code}</strong>`;
                badge.classList.add('valid');
                submitBtn.disabled = false;
            } else {
                badge.innerHTML = `❌ Code invalide: ${code}`;
                badge.classList.remove('valid');
                submitBtn.disabled = true;
            }

            // Gestion du formulaire
            const form = document.getElementById('inscriptionForm');
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (password.value !== confirm.value) {
                    document.getElementById('message').innerHTML = '<div class="message error">❌ Les mots de passe ne correspondent pas</div>';
                    return;
                }
                
                if (password.value.length < 6) {
                    document.getElementById('message').innerHTML = '<div class="message error">❌ Mot de passe trop court</div>';
                    return;
                }
                
                const userData = {
                    fullName: document.getElementById('fullName').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: password.value,
                    referralCode: code
                };
                
                submitBtn.disabled = true;
                submitBtn.textContent = 'Inscription...';
                
                const result = await inscrireUtilisateur(userData);
                
                if (result.success) {
                    document.getElementById('message').innerHTML = '<div class="message success">✅ Inscription réussie ! Redirection...</div>';
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                } else {
                    document.getElementById('message').innerHTML = `<div class="message error">❌ ${result.error}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'S\'inscrire';
                }
            });
        });
    </script>
</body>
</html>
