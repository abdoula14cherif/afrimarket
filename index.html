<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body { font-family: Arial; background: #1d3557; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #1d3557; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Inscription</h2>
        <form id="inscription-form">
            <input type="text" id="referral-code" placeholder="Code de parrainage" required readonly>
            <input type="text" id="nom-complet" placeholder="Nom complet" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <input type="password" id="confirm-password" placeholder="Confirmer" required>
            <button type="submit">S'inscrire</button>
        </form>
    </div>

    <script>
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Récupérer le code de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || 'ABDOULA';
        document.getElementById('referral-code').value = refCode.toUpperCase();
        
        // Formulaire
        document.getElementById('inscription-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const nom = document.getElementById('nom-complet').value;
            
            if (password !== confirm) {
                alert('❌ Mots de passe différents');
                return;
            }
            
            try {
                // 1. INSCRIPTION
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { nom_complet: nom, referral_code: refCode.toUpperCase() }
                    }
                });
                
                if (error) throw error;
                
                alert('✅ Inscription réussie !');
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                alert('❌ ' + (error.message || 'Erreur technique'));
            }
        });
    </script>
</body>
</html>
