<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription SIMPLE</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #0066cc; color: white; border: none; font-size: 16px; }
        .message { padding: 10px; margin: 10px 0; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center;">Inscription</h2>
        
        <div id="message" class="message"></div>
        
        <input type="email" id="email" placeholder="Email" value="test@test.com">
        <input type="password" id="password" placeholder="Mot de passe" value="123456">
        
        <button onclick="tester()">TEST RAPIDE</button>
        <button onclick="inscrire()">S'INSCRIRE</button>
        
        <p style="text-align:center; margin-top:20px;">
            <a href="connexion.html">Connexion</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // TES CLAIRES ICI - À VÉRIFIER ABSOLUMENT
        const SUPABASE_URL = 'https://kfbstzlauxdwezgtzdsx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYnN0emxhdXhkd2V6Z3R6ZHN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5ODYzMDQsImV4cCI6MjA4NjU2MjMwNH0.a43ze2_uKyaEgodntEvMRFEH7mNgByyfUHfzQpEKDFM';

        // Initialisation
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const message = document.getElementById('message');

        function showMessage(text, type) {
            message.className = 'message ' + type;
            message.innerHTML = text;
        }

        // TEST 1 : Vérifier la connexion
        async function tester() {
            showMessage('Test en cours...', 'success');
            
            try {
                const { error } = await supabase.auth.getSession();
                if (error) throw error;
                showMessage('✅ Connexion Supabase OK !', 'success');
            } catch (error) {
                showMessage('❌ ERREUR: ' + error.message, 'error');
            }
        }

        // TEST 2 : Inscription
        async function inscrire() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            showMessage('Inscription en cours...', 'success');
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                showMessage('✅ INSCRIPTION RÉUSSIE ! Vérifie tes emails', 'success');
                console.log('Succès:', data);
                
            } catch (error) {
                showMessage('❌ ERREUR: ' + error.message, 'error');
                console.error('Erreur:', error);
            }
        }

        // Test auto au chargement
        setTimeout(tester, 1000);
    </script>
</body>
</html>
