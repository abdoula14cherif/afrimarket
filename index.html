<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            color: #1d3557;
            text-align: center;
            margin-bottom: 30px;
        }
        .code-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }
        .code-badge.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #1d3557;
            outline: none;
        }
        input[readonly] {
            background: #f8fafc;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 AFRIMARKET</h2>
        
        <div id="codeBadge" class="code-badge">
            🔍 Vérification du code...
        </div>

        <form id="inscriptionForm">
            <input type="text" id="referralCode" placeholder="Code de parrainage" readonly>
            
            <input type="text" id="fullName" placeholder="Nom complet" required>
            
            <input type="email" id="email" placeholder="Email" required>
            
            <input type="password" id="password" placeholder="Mot de passe (6 caractères)" minlength="6" required>
            
            <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required>
            
            <button type="submit" id="submitBtn">S'inscrire</button>
        </form>

        <div id="message" style="margin-top: 20px;"></div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ============================================
        // GÉNÉRER UUID
        // ============================================
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ============================================
        // CODE DE PARRAINAGE
        // ============================================
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            return code ? code.toUpperCase() : 'ABDOULA';
        }

        // ============================================
        // INSCRIPTION
        // ============================================
        async function inscrireUtilisateur(userData) {
            try {
                // 1. GÉNÉRER UN ID
                const userId = generateUUID();
                console.log('✅ ID généré:', userId);
                
                // 2. GÉNÉRER UN CODE DE PARRAINAGE
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // 3. INSÉRER DANS users
                console.log('📦 Insertion users...');
                const { error: userError } = await supabase
                    .from('users')
                    .insert({
                        id: userId,
                        email: userData.email,
                        nom_complet: userData.fullName,
                        telephone: userData.telephone || '',
                        role: 'user',
                        statut: 'active',
                        created_at: new Date().toISOString()
                    });
                
                if (userError) {
                    console.error('❌ Erreur users:', userError);
                    throw userError;
                }
                
                // 4. INSÉRER DANS referral_data
                console.log('📦 Insertion referral_data...');
                await supabase
                    .from('referral_data')
                    .insert({
                        user_id: userId,
                        referral_code: refCode,
                        referral_link: 'https://afrimarket-prod.vercel.app/index.html?ref=' + refCode,
                        is_unlocked: false,
                        created_at: new Date().toISOString()
                    });
                
                // 5. STOCKAGE LOCAL
                localStorage.setItem('afrimarket_user_id', userId);
                localStorage.setItem('afrimarket_user_email', userData.email);
                localStorage.setItem('afrimarket_user_name', userData.fullName);
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_referral_used', userData.referral_code);
                
                return { success: true };
                
            } catch (error) {
                console.error('❌ Erreur:', error);
                return { success: false, error: error.message };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            // CODE DE PARRAINAGE
            const code = getReferralCodeFromURL();
            document.getElementById('referralCode').value = code;
            
            const badge = document.getElementById('codeBadge');
            badge.innerHTML = `✅ Code valide: <strong>${code}</strong>`;
            badge.classList.add('success');

            // FORMULAIRE
            document.getElementById('inscriptionForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const password = document.getElementById('password').value;
                const confirm = document.getElementById('confirmPassword').value;
                
                if (password !== confirm) {
                    document.getElementById('message').innerHTML = '<div class="message error">❌ Les mots de passe ne correspondent pas</div>';
                    return;
                }
                
                if (password.length < 6) {
                    document.getElementById('message').innerHTML = '<div class="message error">❌ Mot de passe trop court</div>';
                    return;
                }
                
                const userData = {
                    fullName: document.getElementById('fullName').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    telephone: '',
                    referral_code: code
                };
                
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.textContent = 'Inscription...';
                
                const result = await inscrireUtilisateur(userData);
                
                if (result.success) {
                    document.getElementById('message').innerHTML = '<div class="message success">✅ Inscription réussie ! Redirection...</div>';
                    setTimeout(() => window.location.href = 'dashboard.html', 2000);
                } else {
                    document.getElementById('message').innerHTML = `<div class="message error">❌ ${result.error}</div>`;
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                }
            });
        });
    </script>
</body>
</html>
