<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #1d3557; text-align: center; }
        input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .link { text-align: center; margin-top: 20px; }
        .link a { color: #1d3557; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Connexion</h1>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
        
        <div id="message"></div>
        
        <div class="link">
            <a href="index.html">Pas encore de compte ? S'inscrire</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'abdoula14cherif@gmail.com';
        const ADMIN_PASSWORD = 'abdoula.@5';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // Admin
            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_user_email', email);
                localStorage.setItem('afrimarket_user_name', 'Abdoula Cherif');
                localStorage.setItem('afrimarket_user_role', 'admin');
                window.location.href = 'admin.html';
                return;
            }
            
            // Utilisateur normal
            const { data, error } = await supabase.auth.signInWithPassword({
                email, password
            });
            
            if (error) {
                document.getElementById('message').innerHTML = '<div class="message error">❌ Email ou mot de passe incorrect</div>';
                return;
            }
            
            localStorage.setItem('afrimarket_logged_in', 'true');
            localStorage.setItem('afrimarket_user_id', data.user.id);
            localStorage.setItem('afrimarket_user_email', data.user.email);
            localStorage.setItem('afrimarket_user_name', data.user.user_metadata?.nom_complet || 'Utilisateur');
            localStorage.setItem('afrimarket_user_role', 'user');
            
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
