<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Inscription TEST</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
</head>
<body>
    <h1>TEST INSCRIPTION</h1>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Mot de passe"><br>
    <input id="nom" placeholder="Nom complet"><br>
    <button onclick="testInscription()">S'inscrire</button>
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function testInscription() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const nom = document.getElementById('nom').value;
            
            try {
                // 1. AUTH
                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { nom_complet: nom } }
                });
                
                if (error) throw error;
                
                // 2. USERS
                const { error: insertError } = await supabase
                    .from('users')
                    .insert({
                        id: data.user.id,
                        email: email,
                        nom_complet: nom,
                        role: 'user',
                        statut: 'active'
                    });
                
                if (insertError) {
                    document.getElementById('result').innerHTML = 
                        '❌ Erreur insertion: ' + insertError.message;
                } else {
                    document.getElementById('result').innerHTML = '✅ Succès !';
                }
                
            } catch (e) {
                document.getElementById('result').innerHTML = '❌ ' + e.message;
            }
        }
    </script>
</body>
</html>
