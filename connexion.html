<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
</head>
<body class="light-mode">
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                <h1 style="font-family: 'Montserrat', sans-serif;">AFRI<span style="color: var(--primary-red);">MARKET</span></h1>
            </a>
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-sign-in-alt"></i> Connexion</h2>
                <p>Connectez-vous à votre compte AFRIMARKET</p>
            </div>

            <form id="connexion-form" class="auth-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="login-email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="login-email" name="email" 
                           placeholder="exemple@email.com" required>
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label for="login-password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="login-password" name="password" 
                               placeholder="Votre mot de passe" required>
                        <button type="button" class="toggle-password" id="login-toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me"> Se souvenir de moi
                        </label>
                        <a href="mot-de-passe-oublie.html" class="forgot-password">
                            Mot de passe oublié ?
                        </a>
                    </div>
                </div>

                <!-- Bouton de connexion -->
                <button type="submit" class="btn auth-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>

                <!-- Séparateur -->
                <div class="separator">
                    <span>ou</span>
                </div>

                <!-- Connexion sociale -->
                <div class="social-auth">
                    <button type="button" class="btn social-btn google-btn" id="login-google">
                        <i class="fab fa-google"></i> Continuer avec Google
                    </button>
                    <button type="button" class="btn social-btn facebook-btn" id="login-facebook">
                        <i class="fab fa-facebook-f"></i> Continuer avec Facebook
                    </button>
                </div>

                <!-- Liens -->
                <div class="auth-footer">
                    <p>Pas encore de compte ? <a href="inscription.html" class="link">S'inscrire</a></p>
                    <p><a href="index.html" class="link">Continuer sans compte</a></p>
                </div>
            </form>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Gestion du thème
            const themeBtn = document.getElementById('theme-btn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
            });

            // Toggle mot de passe
            const toggleBtn = document.getElementById('login-toggle-password');
            const passwordInput = document.getElementById('login-password');
            
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? 
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            // Soumission formulaire
            const form = document.getElementById('connexion-form');
            const loginBtn = document.getElementById('login-btn');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const rememberMe = document.getElementById('remember-me').checked;

                // Désactiver bouton
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';

                try {
                    // Appeler la fonction de connexion depuis auth.js
                    const result = await connecterUtilisateur(email, password, rememberMe);
                    
                    if (result.success) {
                        // Redirection vers l'accueil
                        window.location.href = 'index.html';
                    } else {
                        alert('Erreur: ' + result.error);
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                    }
                } catch (error) {
                    alert('Erreur lors de la connexion: ' + error.message);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                }
            });
        });
    </script>
</body>
</html>
