<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - AFRIMARKET</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <!-- SUPABASE OBLIGATOIRE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 400px;
        }
        
        .notification.success {
            background: #10b981;
        }
        
        .notification.error {
            background: #ef4444;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
        }
        
        .loading-spinner {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body class="light-mode">
    <!-- Overlay de chargement -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 15px;">Connexion en cours...</p>
        </div>
    </div>

    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-arrow-left"></i>
                <h1 style="font-family: 'Montserrat', sans-serif;">AFRI<span style="color: var(--primary-red);">MARKET</span></h1>
            </a>
            <div class="header-actions">
                <button class="theme-btn" id="theme-btn">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-sign-in-alt"></i> Connexion</h2>
                <p>Connectez-vous à votre compte AFRIMARKET</p>
            </div>

            <form id="connexion-form" class="auth-form">
                <!-- Email -->
                <div class="form-group">
                    <label for="login-email" class="form-label required">
                        <i class="fas fa-envelope"></i> Adresse email
                    </label>
                    <input type="email" id="login-email" name="email" 
                           placeholder="exemple@email.com" required>
                </div>

                <!-- Mot de passe -->
                <div class="form-group">
                    <label for="login-password" class="form-label required">
                        <i class="fas fa-lock"></i> Mot de passe
                    </label>
                    <div class="password-input">
                        <input type="password" id="login-password" name="password" 
                               placeholder="Votre mot de passe" required>
                        <button type="button" class="toggle-password" id="login-toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me"> Se souvenir de moi
                        </label>
                        <a href="mot-de-passe-oublie.html" class="forgot-password">
                            Mot de passe oublié ?
                        </a>
                    </div>
                </div>

                <!-- Bouton de connexion -->
                <button type="submit" class="btn auth-btn" id="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>

                <!-- Liens -->
                <div class="auth-footer">
                    <p>Pas encore de compte ? <a href="inscription.html" class="link">S'inscrire</a></p>
                    <p><a href="index.html" class="link">Continuer sans compte</a></p>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        let supabaseClient = null;
        
        // Fonction pour afficher les notifications
        function showNotification(message, type = 'info') {
            // Supprimer les anciennes notifications
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            // Créer la nouvelle notification
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 
                               type === 'error' ? 'fa-exclamation-circle' : 
                               'fa-info-circle'}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notif);
            
            // Supprimer après 5 secondes
            setTimeout(() => notif.remove(), 5000);
        }
        
        // Fonction pour montrer/cacher le loading
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const loginBtn = document.getElementById('login-btn');
            
            if (show) {
                overlay.style.display = 'flex';
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connexion...';
            } else {
                overlay.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        }
        
        // Fonction de connexion
        async function connecterUtilisateur(email, password, rememberMe = false) {
            try {
                console.log('Connexion pour:', email);
                
                // Connexion avec Supabase
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('Erreur connexion:', error);
                    
                    let errorMsg = error.message;
                    if (error.message.includes('Invalid login credentials')) {
                        errorMsg = 'Email ou mot de passe incorrect';
                    } else if (error.message.includes('Email not confirmed')) {
                        errorMsg = 'Veuillez confirmer votre email avant de vous connecter';
                    }
                    
                    return { success: false, error: errorMsg };
                }
                
                console.log('✅ Connexion réussie:', data);
                
                // Stocker les informations utilisateur
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', data.user.user_metadata?.nom_complet || '');
                localStorage.setItem('afrimarket_logged_in', 'true');
                
                if (rememberMe) {
                    localStorage.setItem('afrimarket_remember_me', 'true');
                }
                
                return {
                    success: true,
                    message: 'Connexion réussie !',
                    user: data.user
                };
                
            } catch (error) {
                console.error('Erreur générale:', error);
                return {
                    success: false,
                    error: 'Erreur de connexion. Veuillez réessayer.'
                };
            }
        }
        
        // Vérifier si déjà connecté
        async function verifierSession() {
            try {
                const userId = localStorage.getItem('afrimarket_user_id');
                const loggedIn = localStorage.getItem('afrimarket_logged_in') === 'true';
                
                if (userId && loggedIn) {
                    // Vérifier avec Supabase si client existe
                    if (supabaseClient) {
                        const { data } = await supabaseClient.auth.getSession();
                        if (!data.session) {
                            return { loggedIn: false };
                        }
                    }
                    
                    return {
                        loggedIn: true,
                        user: {
                            id: userId,
                            email: localStorage.getItem('afrimarket_user_email'),
                            user_metadata: {
                                nom_complet: localStorage.getItem('afrimarket_user_name')
                            }
                        }
                    };
                }
                
                return { loggedIn: false };
                
            } catch (error) {
                console.error('Erreur vérification session:', error);
                return { loggedIn: false };
            }
        }
        
        // Initialisation
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Page connexion chargée');
            
            // Initialiser Supabase
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
                console.log('✅ Supabase initialisé');
            } else {
                showNotification('Erreur: Supabase non chargé', 'error');
            }
            
            // Vérifier si déjà connecté
            const session = await verifierSession();
            if (session.loggedIn) {
                console.log('✅ Utilisateur déjà connecté, redirection...');
                showNotification('Vous êtes déjà connecté', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return;
            }
            
            // Gestion du thème
            const themeBtn = document.getElementById('theme-btn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            document.body.className = savedTheme;
            
            themeBtn.addEventListener('click', function() {
                const isDark = document.body.classList.contains('dark-mode');
                document.body.className = isDark ? 'light-mode' : 'dark-mode';
                localStorage.setItem('afrimarket_theme', isDark ? 'light-mode' : 'dark-mode');
            });
            
            // Toggle mot de passe
            const toggleBtn = document.getElementById('login-toggle-password');
            const passwordInput = document.getElementById('login-password');
            
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? 
                    '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // Soumission formulaire
            const form = document.getElementById('connexion-form');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Formulaire soumis');
                
                const email = document.getElementById('login-email').value.trim().toLowerCase();
                const password = document.getElementById('login-password').value;
                const rememberMe = document.getElementById('remember-me').checked;
                
                // Validation basique
                if (!email.includes('@')) {
                    showNotification('Email invalide', 'error');
                    return;
                }
                
                if (password.length < 6) {
                    showNotification('Mot de passe trop court (minimum 6 caractères)', 'error');
                    return;
                }
                
                // Afficher le loading
                showLoading(true);
                
                try {
                    // Appeler la fonction de connexion
                    const result = await connecterUtilisateur(email, password, rememberMe);
                    
                    if (result.success) {
                        showNotification(result.message, 'success');
                        
                        // Redirection DIRECTE vers index.html après 2 secondes
                        setTimeout(() => {
                            console.log('Redirection vers index.html');
                            window.location.href = 'index.html?welcome=true';
                        }, 2000);
                        
                    } else {
                        showNotification('Erreur: ' + result.error, 'error');
                        showLoading(false);
                    }
                    
                } catch (error) {
                    console.error('Erreur catch:', error);
                    showNotification('Erreur technique: ' + error.message, 'error');
                    showLoading(false);
                }
            });
            
            // Pré-remplir l'email si stocké
            const savedEmail = localStorage.getItem('afrimarket_user_email');
            if (savedEmail) {
                document.getElementById('login-email').value = savedEmail;
                document.getElementById('remember-me').checked = true;
            }
            
            // Vérifier que tout est prêt
            setTimeout(() => {
                if (!supabaseClient) {
                    showNotification('⚠️ Supabase non initialisé. Rechargez la page.', 'error');
                }
            }, 1000);
        });
    </script>
</body>
</html>
