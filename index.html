<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - AFRIMARKET</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            color: #1d3557;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .subtitle {
            color: #64748b;
            text-align: center;
            margin-bottom: 30px;
        }
        .code-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .code-badge.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #1d3557;
            outline: none;
            box-shadow: 0 0 0 3px rgba(29,53,87,0.1);
        }
        input[readonly] {
            background: #f8fafc;
            border-color: #cbd5e1;
            cursor: not-allowed;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1d3557, #2a5298);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(29,53,87,0.3);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        .info { background: #dbeafe; color: #1e40af; }
        .hidden { display: none; }
        .debug {
            margin-top: 20px;
            padding: 15px;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🚀 AFRIMARKET</h1>
            <div class="subtitle">Rejoignez la communauté</div>
            
            <div id="codeBadge" class="code-badge">
                <span id="codeMessage">🔍 Vérification du code de parrainage...</span>
            </div>

            <form id="inscriptionForm">
                <div class="form-group">
                    <label>📌 Code de parrainage</label>
                    <input type="text" id="referralCode" readonly>
                </div>

                <div class="form-group">
                    <label>👤 Nom complet</label>
                    <input type="text" id="fullName" placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label>🔐 Mot de passe</label>
                    <input type="password" id="password" placeholder="Minimum 6 caractères" minlength="6" required>
                </div>

                <div class="form-group">
                    <label>🔐 Confirmer le mot de passe</label>
                    <input type="password" id="confirmPassword" placeholder="Retapez votre mot de passe" required>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    ✅ S'inscrire
                </button>
            </form>

            <div id="message" class="message hidden"></div>
            <div id="debug" class="debug"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // ÉTAT GLOBAL
        // ============================================
        let validReferralCode = 'ABDOULA'; // Code admin par défaut
        let isValidated = false;

        // ============================================
        // DEBUG
        // ============================================
        function debug(message, type = 'info') {
            const debugEl = document.getElementById('debug');
            const time = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            debugEl.innerHTML += `<div>[${time}] ${message}</div>`;
            console.log(`[${time}] ${message}`);
        }

        function showMessage(message, type = 'info') {
            const msgEl = document.getElementById('message');
            msgEl.className = `message ${type}`;
            msgEl.innerHTML = message;
            msgEl.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message').classList.add('hidden');
        }

        // ============================================
        // RÉCUPÉRER LE CODE DE L'URL
        // ============================================
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            
            return code ? code.toUpperCase() : null;
        }

        // ============================================
        // VALIDATION DU CODE - VERSION SIMPLIFIÉE
        // ============================================
        async function validateReferralCode(code) {
            debug(`🔍 Validation du code: ${code}`);
            
            // ✅ CODE ADMIN - TOUJOURS VALIDE
            if (code === 'ABDOULA') {
                debug('✅ Code ABDOULA validé');
                return true;
            }
            
            // ✅ TOUS LES CODES SONT ACCEPTÉS POUR LE TEST
            debug(`✅ Code ${code} accepté`);
            return true;
        }

        // ============================================
        // GÉNÉRER UN ID UNIQUE
        // ============================================
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // ============================================
        // INSCRIPTION - SANS AUTH
        // ============================================
        async function inscrireUtilisateur(userData) {
            debug(`📝 Début inscription pour: ${userData.email}`);
            
            try {
                // 1. GÉNÉRER UN ID UNIQUE
                const userId = generateUUID();
                debug(`🆔 ID généré: ${userId}`);
                
                // 2. GÉNÉRER UN CODE DE PARRAINAGE
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                debug(`🔑 Code parrainage: ${refCode}`);
                
                // 3. INSÉRER DIRECTEMENT DANS LA TABLE users
                debug(`📦 Insertion dans users...`);
                const { data: userData2, error: userError } = await supabase
                    .from('users')
                    .insert({
                        id: userId,
                        email: userData.email,
                        nom_complet: userData.fullName,
                        telephone: userData.telephone || '',
                        role: 'user',
                        statut: 'active',
                        created_at: new Date().toISOString()
                    })
                    .select();
                
                if (userError) {
                    debug(`❌ Erreur insertion users: ${userError.message}`);
                    throw userError;
                }
                
                debug(`✅ Utilisateur créé dans users`);
                
                // 4. INSÉRER DANS referral_data
                debug(`📦 Insertion dans referral_data...`);
                const { error: refError } = await supabase
                    .from('referral_data')
                    .insert({
                        user_id: userId,
                        referral_code: refCode,
                        referral_link: 'https://afrimarket-prod.vercel.app/index.html?ref=' + refCode,
                        is_unlocked: false,
                        created_at: new Date().toISOString()
                    });
                
                if (refError) {
                    debug(`⚠️ Erreur referral_data: ${refError.message}`);
                } else {
                    debug(`✅ referral_data OK`);
                }
                
                // 5. STOCKER DANS LOCALSTORAGE
                localStorage.setItem('afrimarket_user_id', userId);
                localStorage.setItem('afrimarket_user_email', userData.email);
                localStorage.setItem('afrimarket_user_name', userData.fullName);
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_referral_used', userData.referral_code);
                
                debug(`✅ Session localStorage créée`);
                
                return { 
                    success: true, 
                    message: '✅ Inscription réussie !',
                    userId: userId
                };
                
            } catch (error) {
                debug(`❌ ERREUR: ${error.message}`);
                return { 
                    success: false, 
                    error: error.message 
                };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            debug('🚀 Page inscription chargée');
            debug(`🔗 URL: ${window.location.href}`);
            
            // 1. CODE DE PARRAINAGE
            let codeFromURL = getReferralCodeFromURL();
            
            if (!codeFromURL) {
                codeFromURL = 'ABDOULA';
                debug(`⚠️ Aucun code trouvé, utilisation du code par défaut: ${codeFromURL}`);
            }
            
            document.getElementById('referralCode').value = codeFromURL;
            
            // 2. VALIDATION
            const isValid = await validateReferralCode(codeFromURL);
            
            if (isValid) {
                validReferralCode = codeFromURL;
                isValidated = true;
                
                const badge = document.getElementById('codeBadge');
                badge.classList.add('success');
                document.getElementById('codeMessage').innerHTML = `✅ Code parrainage valide: <strong>${codeFromURL}</strong>`;
            } else {
                document.getElementById('codeMessage').innerHTML = `❌ Code invalide: ${codeFromURL}`;
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            // 3. VALIDATION MOT DE PASSE
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            
            function validatePasswords() {
                if (password.value && confirm.value) {
                    if (password.value !== confirm.value) {
                        showMessage('❌ Les mots de passe ne correspondent pas', 'error');
                        return false;
                    }
                    if (password.value.length < 6) {
                        showMessage('❌ Le mot de passe doit contenir au moins 6 caractères', 'error');
                        return false;
                    }
                    hideMessage();
                    return true;
                }
                return false;
            }
            
            password.addEventListener('input', validatePasswords);
            confirm.addEventListener('input', validatePasswords);

            // 4. SUBMIT
            const form = document.getElementById('inscriptionForm');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideMessage();
                
                // VALIDATIONS
                if (!validatePasswords()) {
                    return;
                }
                
                const fullName = document.getElementById('fullName').value.trim();
                if (fullName.length < 2) {
                    showMessage('❌ Veuillez entrer votre nom complet', 'error');
                    return;
                }
                
                const email = document.getElementById('email').value.trim().toLowerCase();
                if (!email.includes('@') || !email.includes('.')) {
                    showMessage('❌ Email invalide', 'error');
                    return;
                }
                
                // DÉSACTIVER LE BOUTON
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerHTML = '⏳ Inscription en cours...';
                
                // INSCRIPTION
                const userData = {
                    fullName: fullName,
                    email: email,
                    password: password.value,
                    telephone: '',
                    referral_code: validReferralCode
                };
                
                const result = await inscrireUtilisateur(userData);
                
                if (result.success) {
                    showMessage('✅ Inscription réussie ! Redirection...', 'success');
                    debug(`✅ Redirection vers dashboard.html`);
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    showMessage(`❌ ${result.error}`, 'error');
                    btn.disabled = false;
                    btn.innerHTML = '✅ S\'inscrire';
                }
            });
        });
    </script>
</body>
</html>
