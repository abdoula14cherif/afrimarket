<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inscription - AFRIMARKET</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --primary-blue: #1d3557;
            --primary-red: #ef4444;
            --primary-orange: #f97316;
            --primary-green: #10b981;
            --light-bg: #f8fafc;
            --light-card: #ffffff;
            --light-text: #1e293b;
            --light-border: #e2e8f0;
            --light-gray: #94a3b8;
            --dark-bg: #0f172a;
            --dark-card: #1e293b;
            --dark-text: #f1f5f9;
            --dark-border: #334155;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.15);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        .app-header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            padding: 15px 25px;
            margin-bottom: 30px;
        }
        .header-content { display: flex; align-items: center; justify-content: space-between; }
        .logo-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px;
        }
        .logo-text { font-family: 'Montserrat', sans-serif; font-size: 22px; font-weight: 900; color: white; }
        .logo-text span { color: #ffd700; }
        .theme-btn {
            background: rgba(255,255,255,0.2); border: none; width: 40px; height: 40px;
            border-radius: 50%; color: white; font-size: 20px; cursor: pointer;
        }
        .auth-card {
            background: white; border-radius: var(--radius-lg); padding: 40px 30px;
            box-shadow: var(--shadow-lg);
        }
        .dark-mode .auth-card { background: var(--dark-card); }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 {
            font-size: 28px; font-weight: 700; color: var(--primary-blue);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .referral-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: var(--radius-md); padding: 20px; margin-bottom: 25px;
            display: flex; align-items: center; gap: 15px; color: white;
        }
        .referral-badge-code {
            background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px;
            font-family: monospace; font-size: 14px; display: inline-block;
        }
        .auth-form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-label {
            font-size: 14px; font-weight: 600; color: var(--light-text);
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .form-label.required:after { content: " *"; color: var(--primary-red); }
        .form-input {
            width: 100%; padding: 14px 16px; border: 2px solid var(--light-border);
            border-radius: var(--radius-md); font-size: 14px;
            background: var(--light-bg); color: var(--light-text);
        }
        .form-input:focus {
            outline: none; border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(29,53,87,0.1);
        }
        .form-input[readonly] { background: rgba(29,53,87,0.05); cursor: not-allowed; }
        .password-input { position: relative; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--light-gray); cursor: pointer;
        }
        .form-error {
            font-size: 12px; margin-top: 5px; color: var(--primary-red);
            display: flex; align-items: center; gap: 5px;
        }
        .checkbox-group {
            display: flex; align-items: center; gap: 10px; margin-top: 5px;
        }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: var(--radius-md);
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-blue), #2a5298);
            color: white; box-shadow: 0 4px 15px rgba(29,53,87,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .auth-footer { text-align: center; margin-top: 25px; padding-top: 25px; border-top: 1px solid var(--light-border); }
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            border-radius: var(--radius-md); color: white; font-weight: 600;
            z-index: 10000; animation: slideInRight 0.3s ease;
            display: flex; align-items: center; gap: 12px; max-width: 400px;
        }
        .notification.success { background: linear-gradient(135deg, #10b981, #059669); }
        .notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0%); opacity: 1; }
        }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); display: none; justify-content: center;
            align-items: center; z-index: 10001; backdrop-filter: blur(5px);
        }
        .loading-spinner {
            background: white; padding: 40px; border-radius: var(--radius-lg);
            text-align: center; box-shadow: var(--shadow-lg);
        }
        .loading-spinner i { font-size: 48px; color: var(--primary-blue); margin-bottom: 15px; }
        @media (max-width: 480px) {
            .auth-card { padding: 30px 20px; }
            .auth-header h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p style="margin-top: 15px; font-size: 16px; font-weight: 600;">Inscription en cours...</p>
        </div>
    </div>

    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <a href="index.html" class="logo-container">
                    <div class="logo-icon"><i class="fas fa-store"></i></div>
                    <div class="logo-text">AFRI<span>MARKET</span></div>
                </a>
                <button class="theme-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fas fa-user-plus"></i> Inscription</h2>
                <p>Rejoignez AFRIMARKET et commencez à gagner</p>
            </div>

            <div id="referralBadgeContainer"></div>

            <form id="inscriptionForm" class="auth-form">
                <div class="form-group">
                    <label for="referralCode" class="form-label required">
                        <i class="fas fa-gift"></i> Code de parrainage
                    </label>
                    <input type="text" id="referralCode" class="form-input" placeholder="Code obligatoire" required readonly>
                    <div id="referralError" class="form-error" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="fullName" class="form-label required"><i class="fas fa-user"></i> Nom complet</label>
                    <input type="text" id="fullName" class="form-input" placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label required"><i class="fas fa-envelope"></i> Adresse email</label>
                    <input type="email" id="email" class="form-input" placeholder="exemple@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required"><i class="fas fa-lock"></i> Mot de passe</label>
                    <div class="password-input">
                        <input type="password" id="password" class="form-input" placeholder="Minimum 6 caractères" required minlength="6">
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label required"><i class="fas fa-lock"></i> Confirmer</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" class="form-input" placeholder="Retapez votre mot de passe" required>
                        <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
                    </div>
                    <div id="passwordMatch" class="form-error" style="color: var(--primary-green);"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="conditions" required>
                    <label for="conditions">J'accepte les <a href="conditions.html" target="_blank">conditions d'utilisation</a></label>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <i class="fas fa-user-plus"></i> S'inscrire
                </button>

                <div class="auth-footer">
                    <p>Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION SUPABASE
        // ============================================
        const SUPABASE_URL = 'https://mpxlbzsyilvzmgbfopkm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1weGxienN5aWx2em1nYmZvcGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNzQ1MTksImV4cCI6MjA4NTg1MDUxOX0.M29oom7n6zJb7iC9QzBCF3w2IyGPBkvps1t76i_6PAA';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ============================================
        // ÉTAT GLOBAL
        // ============================================
        let currentReferralCode = null;
        let isReferralValid = false;

        // ============================================
        // RÉCUPÉRER LE CODE DE L'URL
        // ============================================
        function getReferralCodeFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('ref');
            if (!code && window.location.pathname.includes('/ref/')) {
                code = window.location.pathname.split('/ref/')[1];
                if (code) code = code.split('/')[0].split('?')[0];
            }
            return code ? code.toUpperCase() : null;
        }

        // ============================================
        // VALIDER LE CODE DE PARRAINAGE
        // ============================================
        async function validateReferralCode(code) {
            if (!code) return false;
            try {
                // Code admin toujours valide
                if (code === 'ABDOULA') return true;
                
                const { data, error } = await supabase
                    .from('referral_data')
                    .select('referral_code, is_unlocked')
                    .eq('referral_code', code)
                    .eq('is_unlocked', true)
                    .maybeSingle();
                
                return !error && !!data;
            } catch (e) {
                console.error('Erreur validation:', e);
                return false;
            }
        }

        // ============================================
        // AFFICHER LE BADGE
        // ============================================
        function showReferralBadge(code) {
            const container = document.getElementById('referralBadgeContainer');
            container.innerHTML = `
                <div class="referral-badge">
                    <i class="fas fa-gift"></i>
                    <div style="flex:1">
                        <div style="font-weight:700; margin-bottom:5px;">🎯 Vous êtes parrainé !</div>
                        <span class="referral-badge-code">${code}</span>
                    </div>
                </div>
            `;
        }

        // ============================================
        // ✅ FONCTION D'INSCRIPTION CORRIGÉE - AVEC AUTH
        // ============================================
        async function inscrireUtilisateur(userData) {
            try {
                console.log('📝 Inscription pour:', userData.email);
                
                // 1. CRÉER L'UTILISATEUR DANS AUTH (INDISPENSABLE)
                const { data, error } = await supabase.auth.signUp({
                    email: userData.email,
                    password: userData.password,
                    options: {
                        data: {
                            nom_complet: userData.fullName,
                            role: 'user',
                            referral_code: currentReferralCode
                        }
                    }
                });
                
                if (error) {
                    console.error('❌ Erreur Auth:', error);
                    if (error.message.includes('already registered')) {
                        return { success: false, error: 'Un compte existe déjà avec cet email' };
                    }
                    return { success: false, error: error.message };
                }
                
                if (!data.user) {
                    return { success: false, error: 'Erreur création utilisateur' };
                }
                
                console.log('✅ Utilisateur AUTH créé:', data.user.id);
                
                // 2. INSÉRER DANS LA TABLE users (MÊME ID QUE AUTH)
                const { error: userError } = await supabase
                    .from('users')
                    .insert({
                        id: data.user.id,
                        email: userData.email,
                        nom_complet: userData.fullName,
                        telephone: userData.telephone || '',
                        role: 'user',
                        statut: 'active',
                        created_at: new Date().toISOString()
                    });
                
                if (userError) {
                    console.error('⚠️ Erreur users:', userError);
                }
                
                // 3. GÉNÉRER UN CODE DE PARRAINAGE
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                
                // 4. INSÉRER DANS referral_data
                const { error: refError } = await supabase
                    .from('referral_data')
                    .insert({
                        user_id: data.user.id,
                        referral_code: refCode,
                        referral_link: 'https://afrimarket-prod.vercel.app/index.html?ref=' + refCode,
                        is_unlocked: false,
                        created_at: new Date().toISOString()
                    });
                
                if (refError) {
                    console.error('⚠️ Erreur referral_data:', refError);
                }
                
                // 5. STOCKER EN LOCAL
                localStorage.setItem('afrimarket_logged_in', 'true');
                localStorage.setItem('afrimarket_user_id', data.user.id);
                localStorage.setItem('afrimarket_user_email', data.user.email);
                localStorage.setItem('afrimarket_user_name', userData.fullName);
                localStorage.setItem('afrimarket_user_role', 'user');
                localStorage.setItem('afrimarket_referral_code', refCode);
                
                return { success: true, user: data.user };
                
            } catch (error) {
                console.error('❌ Erreur inscription:', error);
                return { success: false, error: 'Erreur technique. Veuillez réessayer.' };
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Page inscription chargée');
            
            // 1. CODE DE PARRAINAGE
            const codeFromURL = getReferralCodeFromURL();
            const referralInput = document.getElementById('referralCode');
            const referralError = document.getElementById('referralError');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!codeFromURL) {
                referralInput.value = 'CODE REQUIS';
                referralInput.classList.add('error');
                referralError.style.display = 'flex';
                referralError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Un code de parrainage est obligatoire';
                submitBtn.disabled = true;
                showNotification('❌ Code de parrainage requis', 'error');
                return;
            }
            
            referralInput.value = codeFromURL;
            
            // 2. VALIDATION
            showLoading(true);
            const isValid = await validateReferralCode(codeFromURL);
            showLoading(false);
            
            if (isValid) {
                currentReferralCode = codeFromURL;
                isReferralValid = true;
                referralInput.classList.remove('error');
                referralError.style.display = 'none';
                submitBtn.disabled = false;
                showReferralBadge(codeFromURL);
                showNotification('✅ Code de parrainage valide !', 'success');
            } else {
                referralInput.classList.add('error');
                referralError.style.display = 'flex';
                referralError.innerHTML = '<i class="fas fa-exclamation-circle"></i> Code de parrainage invalide ou non débloqué';
                submitBtn.disabled = true;
                showNotification('❌ Code de parrainage invalide', 'error');
            }

            // 3. THEME
            const themeBtn = document.getElementById('themeBtn');
            const savedTheme = localStorage.getItem('afrimarket_theme') || 'light-mode';
            if (savedTheme === 'dark-mode') {
                document.body.classList.add('dark-mode');
                themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            themeBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('afrimarket_theme', isDark ? 'dark-mode' : 'light-mode');
                themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });

            // 4. TOGGLE PASSWORD
            document.querySelectorAll('.toggle-password').forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                });
            });

            // 5. CONFIRMATION MOT DE PASSE
            const password = document.getElementById('password');
            const confirm = document.getElementById('confirmPassword');
            const matchHint = document.getElementById('passwordMatch');
            
            function checkPasswordMatch() {
                if (confirm.value.length > 0) {
                    if (password.value === confirm.value) {
                        matchHint.innerHTML = '✅ Mots de passe identiques';
                        matchHint.style.color = '#10b981';
                    } else {
                        matchHint.innerHTML = '❌ Mots de passe différents';
                        matchHint.style.color = '#ef4444';
                    }
                } else {
                    matchHint.innerHTML = '';
                }
            }
            
            password.addEventListener('input', checkPasswordMatch);
            confirm.addEventListener('input', checkPasswordMatch);

            // 6. SUBMIT
            const form = document.getElementById('inscriptionForm');
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                if (!isReferralValid || !currentReferralCode) {
                    showNotification('❌ Code de parrainage invalide', 'error');
                    return;
                }
                
                if (password.value !== confirm.value) {
                    showNotification('❌ Les mots de passe ne correspondent pas', 'error');
                    return;
                }
                
                if (password.value.length < 6) {
                    showNotification('❌ Le mot de passe doit contenir au moins 6 caractères', 'error');
                    return;
                }
                
                if (!document.getElementById('conditions').checked) {
                    showNotification('❌ Vous devez accepter les conditions', 'error');
                    return;
                }
                
                const userData = {
                    fullName: document.getElementById('fullName').value.trim(),
                    email: document.getElementById('email').value.trim().toLowerCase(),
                    password: password.value,
                    telephone: ''
                };
                
                if (!userData.email.includes('@')) {
                    showNotification('❌ Email invalide', 'error');
                    return;
                }
                
                if (userData.fullName.length < 2) {
                    showNotification('❌ Nom complet trop court', 'error');
                    return;
                }
                
                showLoading(true);
                
                const result = await inscrireUtilisateur(userData);
                
                if (result.success) {
                    showNotification('✅ Inscription réussie ! Redirection...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    showNotification('❌ ' + result.error, 'error');
                    showLoading(false);
                }
            });
        });

        // ============================================
        // UTILITAIRES
        // ============================================
        function showNotification(message, type = 'info') {
            const oldNotif = document.querySelector('.notification');
            if (oldNotif) oldNotif.remove();
            
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}" style="font-size: 20px;"></i>
                <span style="flex: 1;">${message}</span>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 5000);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
